---
# Local development inventory — all services on localhost via podman
# Each service gets a unique alias to prevent Ansible variable merging.
all:
  children:
    openbao_svc:
      hosts:
        openbao-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: openbao
          service_url: "http://localhost:8200"
          health_path: "/v1/sys/health"
          health_status_codes: [200, 429, 472, 473, 501, 503]
          monorepo_deploy_path: platform/services/openbao/deployment

    nocodb_svc:
      hosts:
        nocodb-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: nocodb
          service_url: "http://localhost:8181"
          health_path: "/api/v1/health"
          monorepo_deploy_path: platform/services/nocodb/deployment

    n8n_svc:
      hosts:
        n8n-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: n8n
          service_url: "http://localhost:5678"
          health_path: "/healthz"
          monorepo_deploy_path: platform/services/n8n/deployment

    semaphore_svc:
      hosts:
        semaphore-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: semaphore
          service_url: "http://localhost:{{ semaphore_port | default('3000') }}"
          health_path: "/api/ping"
          monorepo_deploy_path: platform/services/semaphore/deployment

    netbox_svc:
      hosts:
        netbox-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: netbox
          service_url: "http://localhost:8000"
          health_path: "/api/status/"
          monorepo_deploy_path: platform/services/netbox/deployment

    nemoclaw_svc:
      hosts:
        nemoclaw-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: nemoclaw
          monorepo_deploy_path: agents/nemoclaw/deployment

    uhhcraft_svc:
      hosts:
        uhhcraft-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: uhhcraft
          service_url: "http://localhost:3000"
          health_path: "/healthz"
          monorepo_deploy_path: platform/services/uhhcraft/deployment
          container_engine: podman
          # Local AI sidecar endpoints (env.j2). No caddy_svc group locally, so
          # the Phase 5 Caddy distribution is skipped — its minio_upstream vars
          # aren't required here.
          uhhcraft_ai_image_url: "http://localhost:8189"
          uhhcraft_ai_3d_url: "http://localhost:8001"

    inference_comfyui_svc:
      hosts:
        inference-comfyui-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: inference-comfyui
          service_url: "http://localhost:8189"
          health_path: "/health"
          monorepo_deploy_path: platform/services/inference-comfyui/deployment
          container_engine: podman

    inference_hunyuan3d_svc:
      hosts:
        inference-hunyuan3d-local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          service_name: inference-hunyuan3d
          service_url: "http://localhost:8001"
          health_path: "/health"
          monorepo_deploy_path: platform/services/inference-hunyuan3d/deployment
          container_engine: podman

  vars:
    monorepo_repo: "https://github.com/uhstray-io/agent-cloud.git"
    openbao_addr: "http://localhost:8200"

    # Proxmox API (credentials fetched from OpenBao at runtime)
    target_node: "{{ proxmox_node | default('pve') }}"
    vm_storage: vm-lvms
    iso_storage: SharedISOs
    template_vmid: 9000

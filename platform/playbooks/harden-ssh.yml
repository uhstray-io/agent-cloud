---
# harden-ssh.yml — Configure NOPASSWD sudo and lock down sshd
#
# Prerequisites:
#   - SSH keys already distributed (run distribute-ssh-keys.yml first)
#   - SSH key auth verified working
#
# What this playbook does:
#   1. Configures NOPASSWD sudo for ansible_user
#   2. Hardens /etc/ssh/sshd_config and all sshd_config.d/*.conf files
#   3. Restarts sshd
#   4. Verifies password auth is rejected
#   5. Verifies key auth still works
#
# Requires become (sudo). Pass become password via:
#   Semaphore: set ansible_become_password in environment JSON
#   CLI: --become --ask-become-pass
#
# Usage: -e "target_service=agent_cloud"

- name: "Harden SSH on {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: false
  become: true
  vars:
    target_service: "ungrouped"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
    _sshd_settings:
      - { regexp: '^#?\s*PubkeyAuthentication',           line: 'PubkeyAuthentication yes' }
      - { regexp: '^#?\s*PasswordAuthentication',          line: 'PasswordAuthentication no' }
      - { regexp: '^#?\s*ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
      - { regexp: '^#?\s*KbdInteractiveAuthentication',    line: 'KbdInteractiveAuthentication no' }
      - { regexp: '^#?\s*PermitRootLogin',                 line: 'PermitRootLogin no' }

  tasks:
    - name: "Configure NOPASSWD sudo for {{ ansible_user }}"
      ansible.builtin.copy:
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ ansible_user }}"
        mode: "0440"
        validate: "visudo -cf %s"

    - name: "Harden /etc/ssh/sshd_config"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: true
      loop: "{{ _sshd_settings }}"
      loop_control:
        label: "{{ item.line }}"
      notify: Restart sshd

    - name: "Find all sshd_config.d override files"
      ansible.builtin.find:
        paths: /etc/ssh/sshd_config.d
        patterns: "*.conf"
      register: _sshd_overrides

    - name: "Harden each sshd_config.d override file"
      ansible.builtin.lineinfile:
        path: "{{ item.0.path }}"
        regexp: "{{ item.1.regexp }}"
        line: "{{ item.1.line }}"
      loop: "{{ _sshd_overrides.files | product(_sshd_settings) | list }}"
      loop_control:
        label: "{{ item.0.path | basename }}: {{ item.1.line }}"
      when: _sshd_overrides.files | length > 0
      notify: Restart sshd

    - name: "Flush handlers to restart sshd now"
      ansible.builtin.meta: flush_handlers

    # ── Post-lockdown verification (runs from Semaphore runner, no become) ────

    - name: "Fetch management private key from OpenBao"
      ansible.builtin.set_fact:
        _mgmt_priv_key: "{{ lookup('community.hashi_vault.hashi_vault',
          'secret/data/services/ssh:private_key',
          url=_bao_url, auth_method='approle',
          role_id=_bao_role_id, secret_id=_bao_secret_id) }}"
      run_once: true
      become: false

    - name: "Write verification key to temp file"
      ansible.builtin.tempfile:
        state: file
        prefix: ".verify_key_"
      register: _key_file
      delegate_to: localhost
      run_once: true
      become: false

    - name: "Set verification key contents"
      ansible.builtin.copy:
        content: "{{ _mgmt_priv_key }}\n"
        dest: "{{ _key_file.path }}"
        mode: "0600"
      delegate_to: localhost
      run_once: true
      become: false
      no_log: true

    - name: "Verify password auth is rejected"
      ansible.builtin.command:
        cmd: >
          ssh -o BatchMode=yes -o ConnectTimeout=10
              -o StrictHostKeyChecking=accept-new
              -o PubkeyAuthentication=no
              {{ ansible_user }}@{{ ansible_host | default(inventory_hostname) }}
              echo SHOULD_NOT_REACH
      delegate_to: localhost
      become: false
      register: _pw_test
      failed_when: _pw_test.rc == 0
      changed_when: false
      ignore_errors: true

    - name: "Confirm password auth disabled"
      ansible.builtin.assert:
        that: _pw_test.rc != 0
        fail_msg: "WARNING: Password auth still works on {{ service_name }}!"
        success_msg: "{{ service_name }}: password auth REJECTED"

    - name: "Verify key auth still works"
      ansible.builtin.command:
        cmd: >
          ssh -i {{ _key_file.path }}
              -o BatchMode=yes -o ConnectTimeout=10
              -o StrictHostKeyChecking=accept-new
              -o PasswordAuthentication=no -o PubkeyAuthentication=yes
              {{ ansible_user }}@{{ ansible_host | default(inventory_hostname) }}
              echo KEY_AUTH_OK
      delegate_to: localhost
      become: false
      register: _key_test
      failed_when: "'KEY_AUTH_OK' not in _key_test.stdout"
      changed_when: false

    - name: "Remove verification key"
      ansible.builtin.file:
        path: "{{ _key_file.path }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: false

    - name: "Lockdown complete"
      ansible.builtin.debug:
        msg: "{{ service_name }}: password REJECTED, key auth CONFIRMED, NOPASSWD sudo configured, root login disabled"

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: ssh
        state: restarted

---
# clean-deploy-o11y.yml — Destroy and redeploy the observability stack.
#
# WARNING: Destroys ALL o11y data — the prometheus-data / loki-data /
#          grafana-data volumes (metrics history, logs, Grafana state). Configs
#          are committed, so dashboards/datasources re-provision on redeploy.
#          Local-dev shares one deploy tree, so the clone is NOT removed
#          (clean-service.yml branches on local_mode).
#
# Uses composable tasks/clean-service.yml then runs deploy-o11y.yml.

- name: "Clean o11y deployment"
  hosts: o11y_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
  tasks:
    - name: "Destroy existing deployment"
      ansible.builtin.include_tasks: tasks/clean-service.yml

- name: "Fresh deploy"
  import_playbook: deploy-o11y.yml

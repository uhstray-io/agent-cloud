---
# deploy-step-ca.yml — internal CA (Smallstep step-ca) deploy (composable).
#
# Phase 1: Place repo + manage-secrets (the CA key password from OpenBao) +
#          template .env. step-ca auto-initializes its root/intermediate into
#          its volume on first boot (stable thereafter).
# Phase 2: deploy.sh — container lifecycle (compose up, wait healthy).
# Phase 3: Verify the CA is up + the root cert exists.
#
# Plan: plan/development/INTERNAL-CA-DEPLOYMENT.md.

# ── Phase 1: Place repo + secrets + env ─────────────────────────────────────
- name: "Phase 1: Place repo + manage step-ca secrets"
  hosts: step_ca_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    _branch: "{{ service_branch | default('main') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
    # init_password protects the CA keys at rest (keys stay in the volume).
    _secret_definitions:
      - { name: init_password, type: random, length: 40 }
    _env_templates:
      - { src: env.j2, dest: .env, mode: "0600" }

  tasks:
    - name: "Place the monorepo + ensure podman/compose"
      ansible.builtin.include_tasks: tasks/place-monorepo.yml

    - name: "Manage secrets and template env file"
      ansible.builtin.include_tasks: tasks/manage-secrets.yml

# ── Phase 2: Container lifecycle ────────────────────────────────────────────
- name: "Phase 2: Start step-ca"
  hosts: step_ca_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"

  tasks:
    - name: "Run deploy.sh (container lifecycle)"
      ansible.builtin.shell: |
        cd "{{ _deploy_dir }}"
        bash deploy.sh
      environment:
        CONTAINER_ENGINE: "{{ container_engine | default('podman') }}"
        LOCAL_MODE: "{{ 'true' if (local_mode | default(false) | bool) else '' }}"
      register: _deploy
      changed_when: true

    - name: "Show deploy.sh output"
      ansible.builtin.debug:
        var: _deploy.stdout_lines

# ── Phase 3: Verify the CA ──────────────────────────────────────────────────
- name: "Phase 3: Verify step-ca"
  hosts: step_ca_svc
  gather_facts: false
  become: false
  vars:
    _engine: "{{ container_engine | default('podman') }}"

  tasks:
    - name: "CA health (chain-verified, no --insecure)"
      ansible.builtin.command: >-
        {{ _engine }} exec step-ca step ca health
        --ca-url https://localhost:9000 --root /home/step/certs/root_ca.crt
      register: _ca_health
      changed_when: false
      retries: 5
      delay: 3
      until: "'ok' in _ca_health.stdout"

    - name: "Confirm the root cert exists (subject)"
      ansible.builtin.command: >-
        {{ _engine }} exec step-ca step certificate inspect /home/step/certs/root_ca.crt --short
      register: _root
      changed_when: false

    - name: "Report"
      ansible.builtin.debug:
        msg: "step-ca healthy. Root: {{ _root.stdout | trim }}"

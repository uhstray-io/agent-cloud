---
# check-vm-secrets.yml — Read-only check of secrets on VM filesystem
#
# Lists files in secrets/ and config/ directories for a service.
# Also checks what's in OpenBao for comparison.
#
# Usage: -e "target_service=nocodb_svc"

- name: "Check VM secrets for {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: false
  become: false
  vars:
    target_service: "ungrouped"
    _monorepo_dir: "/home/{{ ansible_user }}/agent-cloud"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"

  tasks:
    - name: "Check if monorepo clone exists"
      ansible.builtin.stat:
        path: "{{ _monorepo_dir }}"
      register: _monorepo_stat

    - name: "Check if deploy directory exists"
      ansible.builtin.stat:
        path: "{{ _deploy_dir }}"
      register: _deploy_stat
      when: _monorepo_stat.stat.exists

    - name: "List secrets directory"
      ansible.builtin.find:
        paths: "{{ _deploy_dir }}/secrets"
        patterns: "*"
        file_type: file
      register: _secret_files
      when: _deploy_stat.stat.exists | default(false)
      ignore_errors: true

    - name: "List config directory"
      ansible.builtin.find:
        paths: "{{ _deploy_dir }}/config"
        patterns: "*"
        file_type: file
      register: _config_files
      when: _deploy_stat.stat.exists | default(false)
      ignore_errors: true

    - name: "Check running containers"
      ansible.builtin.shell: |
        set -o pipefail
        {{ container_engine | default('docker') }} ps --format '{{ '{{' }}.Names{{ '}}' }} {{ '{{' }}.Status{{ '}}' }}' 2>/dev/null | grep -i '{{ service_name }}' || echo "No {{ service_name }} containers"
      register: _containers
      changed_when: false

    - name: "Report VM state for {{ service_name }}"
      ansible.builtin.debug:
        msg: |
          === {{ service_name }} VM State ===

          Monorepo clone: {{ 'EXISTS' if _monorepo_stat.stat.exists else 'MISSING' }}
          Deploy dir: {{ 'EXISTS' if (_deploy_stat.stat.exists | default(false)) else 'MISSING' }}

          Secrets directory ({{ _deploy_dir }}/secrets/):
          {% if _secret_files.files is defined and _secret_files.files | length > 0 %}
          {% for f in _secret_files.files | sort(attribute='path') %}
            {{ f.path | basename }} ({{ f.size }} bytes)
          {% endfor %}
            Total: {{ _secret_files.files | length }} files
          {% else %}
            EMPTY or MISSING
          {% endif %}

          Config directory ({{ _deploy_dir }}/config/):
          {% if _config_files.files is defined and _config_files.files | length > 0 %}
          {% for f in _config_files.files | sort(attribute='path') %}
            {{ f.path | basename }} ({{ f.size }} bytes)
          {% endfor %}
            Total: {{ _config_files.files | length }} files
          {% else %}
            EMPTY or MISSING
          {% endif %}

          Running containers:
          {{ _containers.stdout }}

---
# deploy-all.yml — Deploy all services in dependency order
# This is the main playbook Semaphore runs for a full deployment.
#
# Phase 1: OpenBao (secrets backbone — must be first)
# Phase 2: NocoDB + n8n (parallel, both depend on OpenBao)
# Phase 3: NetBox (infrastructure modeling)
# Phase 4: NemoClaw (AI agent — depends on all services)
#
# Each phase clones the agent-cloud monorepo and runs the service deploy.sh.
# GitHub deploy key fetched once from OpenBao, reused across phases.

# ── Phase 1: OpenBao ────────────────────────────────────────────────────
- name: "Phase 1: Deploy OpenBao (secrets backbone)"
  hosts: openbao_svc
  gather_facts: false
  vars:
    _monorepo_dir: "/home/{{ ansible_user | default('uhstray') }}/agent-cloud"
    _branch: "{{ service_branch | default('main') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
  tasks:
    - name: "Deploy OpenBao"
      ansible.builtin.include_tasks: tasks/clone-and-deploy.yml

# ── Phase 2: NocoDB + n8n (parallel) ────────────────────────────────────
- name: "Phase 2: Deploy data & automation services"
  hosts: nocodb_svc:n8n_svc
  gather_facts: false
  strategy: free
  vars:
    _monorepo_dir: "/home/{{ ansible_user | default('uhstray') }}/agent-cloud"
    _branch: "{{ service_branch | default('main') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
  tasks:
    - name: "Deploy {{ service_name }}"
      ansible.builtin.include_tasks: tasks/clone-and-deploy.yml

# ── Phase 3: NetBox ─────────────────────────────────────────────────────
- name: "Phase 3: Deploy NetBox"
  hosts: netbox_svc
  gather_facts: false
  vars:
    _monorepo_dir: "/home/{{ ansible_user | default('uhstray') }}/agent-cloud"
    _branch: "{{ service_branch | default('main') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
  tasks:
    - name: "Deploy NetBox"
      ansible.builtin.include_tasks: tasks/clone-and-deploy.yml

# ── Phase 4: NemoClaw ───────────────────────────────────────────────────
- name: "Phase 4: Deploy NemoClaw"
  hosts: nemoclaw_svc
  gather_facts: false
  vars:
    _monorepo_dir: "/home/{{ ansible_user | default('uhstray') }}/agent-cloud"
    _branch: "{{ service_branch | default('main') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
  tasks:
    - name: "Deploy NemoClaw"
      ansible.builtin.include_tasks: tasks/clone-and-deploy.yml

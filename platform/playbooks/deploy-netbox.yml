---
# deploy-netbox.yml — Full NetBox deployment per automation-composability-plan
#
# Phase 1: Clone repo, manage secrets via OpenBao, template env files
# Phase 2: Run deploy.sh (container operations only)
# Phase 3: Verify deployment health
#
# OpenBao is the source of truth. No secrets/ directory. No generate-secrets.sh.
# Ansible templates compose-ready env files directly from OpenBao data.

# ── Phase 1: Clone + Secrets + Env Files ─────────────────────────────
- name: "Phase 1: Clone repo and configure secrets"
  hosts: netbox_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "/home/{{ ansible_user }}/agent-cloud"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    _branch: "{{ service_branch | default('main') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
    _service_url: "{{ service_url | default('http://localhost:8000') }}"
    _secret_definitions:
      # Core NetBox
      - { name: postgres_password, type: random, length: 32 }
      - { name: redis_password, type: random, length: 32 }
      - { name: redis_cache_password, type: random, length: 32 }
      - { name: secret_key, type: django, length: 50 }
      - { name: api_token_peppers, type: django, length: 50 }
      - { name: superuser_password, type: random, length: 24 }
      # Discovery / Diode
      - { name: diode_redis_password, type: random, length: 32 }
      - { name: diode_postgres_password, type: random, length: 32 }
      - { name: hydra_postgres_password, type: random, length: 32 }
      - { name: hydra_system_secret, type: random, length: 32 }
      - { name: diode_to_netbox_client_secret, type: random, length: 32 }
      - { name: netbox_to_diode_client_secret, type: random, length: 32 }
      - { name: diode_ingest_client_secret, type: random, length: 32 }
      # User-managed (never auto-generated)
      - { name: snmp_community, type: user }
      - { name: pfsense_api_key, type: user }
      - { name: orb_agent_client_id, type: user }
      - { name: orb_agent_client_secret, type: user }
      - { name: device_discovery_password, type: user }
    _env_templates:
      - { src: postgres.env.j2, dest: env/postgres.env }
      - { src: netbox.env.j2, dest: env/netbox.env }
      - { src: discovery.env.j2, dest: env/discovery.env }
      - { src: dot-env.j2, dest: .env }
      - { src: hydra.yaml.j2, dest: discovery/hydra.yaml, mode: "0644" }

  tasks:
    - name: "Install git if needed"
      ansible.builtin.apt:
        name: git
        state: present
      become: true

    - name: "Clone or update agent-cloud monorepo"
      ansible.builtin.git:
        repo: "{{ monorepo_repo }}"
        dest: "{{ _monorepo_dir }}"
        version: "{{ _branch }}"
        force: true

    - name: "Create convenience symlink"
      ansible.builtin.file:
        src: "{{ _deploy_dir }}"
        dest: "/home/{{ ansible_user }}/{{ service_name }}"
        state: link
        force: true
      ignore_errors: true

    - name: "Manage secrets and template env files"
      ansible.builtin.include_tasks: tasks/manage-secrets.yml

# ── Phase 2: Infrastructure (deploy.sh — containers up + healthy) ────
- name: "Phase 2: Start NetBox containers"
  hosts: netbox_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "/home/{{ ansible_user }}/agent-cloud"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"

  tasks:
    - name: "Run deploy.sh (infrastructure)"
      ansible.builtin.shell: |
        cd "{{ _deploy_dir }}"
        bash deploy.sh {{ service_url | default('http://localhost:8000') }}
      environment:
        CONTAINER_ENGINE: "{{ container_engine | default('') }}"
      register: _deploy
      changed_when: true

    - name: "Infrastructure output"
      ansible.builtin.debug:
        var: _deploy.stdout_lines

# ── Phase 3: Application config (post-deploy.sh — migrations, OAuth2, agent) ─
- name: "Phase 3: Configure NetBox application"
  hosts: netbox_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "/home/{{ ansible_user }}/agent-cloud"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"

  tasks:
    - name: "Run post-deploy.sh (migrations, superuser, OAuth2, Orb Agent)"
      ansible.builtin.shell: |
        cd "{{ _deploy_dir }}"
        bash post-deploy.sh {{ service_url | default('http://localhost:8000') }}
      environment:
        CONTAINER_ENGINE: "{{ container_engine | default('') }}"
      register: _post_deploy
      changed_when: true

    - name: "Post-deploy output"
      ansible.builtin.debug:
        var: _post_deploy.stdout_lines

# ── Phase 4: Verify ──────────────────────────────────────────────────
- name: "Phase 4: Verify deployment"
  hosts: netbox_svc
  gather_facts: false
  become: false
  tasks:
    - name: "Health check"
      ansible.builtin.uri:
        url: "{{ service_url }}{{ health_path | default('/login/') }}"
        status_code: [200]
        validate_certs: false
      retries: 10
      delay: 15
      when: service_url is defined

    - name: "NetBox deployed"
      ansible.builtin.debug:
        msg: "NetBox is healthy at {{ service_url | default('N/A') }}"

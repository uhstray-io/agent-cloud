---
# deploy-authentik.yml — central IdP / SSO (Authentik) deploy (composable).
#
# Phase 1: Place repo + manage-secrets (secret_key, bootstrap admin creds, DB
#          password — generated once into OpenBao, reused thereafter) + template
#          .env. The committed blueprints/ travel with the repo (config-as-code).
# Phase 2: deploy.sh — container lifecycle (pull, up postgres+redis+server+
#          worker, wait healthy; first boot migrates + applies blueprints).
# Phase 3: Verify the server is healthy + the API answers.
#
# Plan: plan/development/AUTH-SSO-DEPLOYMENT.md.

# ── Phase 1: Place repo + secrets + env ─────────────────────────────────────
- name: "Phase 1: Place repo + manage authentik secrets"
  hosts: authentik_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ (ansible_user | default('deploy')) ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    _branch: "{{ service_branch | default('main') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
    # secret_key + DB password must be STABLE across redeploys (regenerating
    # secret_key invalidates sessions/tokens; a new DB password breaks auth) —
    # manage-secrets generates once into OpenBao and reuses on later runs.
    _secret_definitions:
      - { name: secret_key, type: random, length: 60 }
      - { name: bootstrap_password, type: random, length: 32 }
      - { name: bootstrap_token, type: random, length: 40 }
      - { name: db_password, type: random, length: 32 }
      # OIDC client secrets — Authentik owns them (it's the IdP). The matching
      # client services read them via manage-secrets `_shared_reads`. The worker
      # injects them into the OAuth2-provider blueprints via !Env.
      # (NetBox uses forward_auth locally — a proxy provider with no client
      # secret; its OIDC secret is added on the prod composable path.)
      - { name: grafana_oidc_client_secret, type: random, length: 40 }
      - { name: erpnext_oidc_client_secret, type: random, length: 40 }
      - { name: semaphore_oidc_client_secret, type: random, length: 40 }
      - { name: openbao_oidc_client_secret, type: random, length: 40 }
      # Day-to-day admin user (agent-cloud-admin.yaml blueprint), member of
      # platform-admins -> top role in every SSO'd app. Worker reads it via !Env.
      - { name: agent_cloud_admin_password, type: random, length: 32 }
      # Operator admin 'stray' (stray-admin.yaml) + platform service account API
      # token (service-account.yaml). Stable across redeploys; worker reads !Env.
      - { name: stray_admin_password, type: random, length: 32 }
      - { name: service_account_token, type: random, length: 60 }
    _env_templates:
      - { src: env.j2, dest: .env, mode: "0600" }
    # Blueprints always applied regardless of environment (groups, flows, admin
    # users, service account). Per-app blueprints are selected from the catalog
    # by `authentik_apps`. zz-sso-bindings is RENDERED (not copied) from the set.
    _shared_blueprints:
      - agent-cloud.yaml
      - platform-groups.yaml
      - agent-cloud-admin.yaml
      - stray-admin.yaml
      - service-account.yaml
    _authentik_tpls: "{{ playbook_dir }}/../services/authentik/deployment"

  tasks:
    - name: "Place the monorepo + ensure podman/compose"
      ansible.builtin.include_tasks: tasks/place-monorepo.yml

    - name: "Manage secrets and template env file"
      ansible.builtin.include_tasks: tasks/manage-secrets.yml

    # ── Composable blueprint selection (manifest-driven) ─────────────────────
    # Assemble blueprints-active/ from the enabled apps so prod shows only prod
    # services. Unset authentik_apps => all catalog apps (local-dev unchanged).
    # See plan/development/PROD-SSO-ROLLOUT-PLAN.md.
    - name: "Load the Authentik app catalog"
      ansible.builtin.include_vars:
        file: "{{ _authentik_tpls }}/app-catalog.yml"

    - name: "Resolve the enabled apps (default: every catalog app)"
      # default WITHOUT the boolean: only an UNDEFINED authentik_apps falls back to
      # the full catalog (local-dev). An explicit `authentik_apps: []` is a real
      # (empty) selection — do NOT treat it as unset, or "expose nothing" silently
      # becomes "expose everything".
      ansible.builtin.set_fact:
        _enabled_apps: "{{ authentik_apps | default(authentik_app_catalog.keys() | list) }}"

    - name: "Validate every enabled app exists in the catalog"
      ansible.builtin.assert:
        that:
          - item in authentik_app_catalog
        fail_msg: "authentik_apps entry '{{ item }}' is not in app-catalog.yml"
      loop: "{{ _enabled_apps }}"

    # NOTE: this rebuilds the FILE set the worker applies. Authentik blueprints are
    # additive — dropping a file does NOT delete the app/provider already created in
    # the DB, so de-selected apps remain as harmless ORPHANS (no outpost binding /
    # access policy, so they grant nothing). This is intentional for the prod prune
    # (see PROD-SSO-ROLLOUT-PLAN.md). Full deprovisioning (state: absent tombstones
    # per removed slug, like openbao-oidc's tombstone) is a tracked future enhancement.
    - name: "Reset the active-blueprints dir (drop de-selected/removed apps)"
      ansible.builtin.file:
        path: "{{ _deploy_dir }}/blueprints-active"
        state: "{{ item }}"
        mode: "0755"
      loop: [absent, directory]
      loop_control:
        label: "{{ item }}"

    - name: "Assemble active blueprints (shared + enabled apps)"
      ansible.builtin.copy:
        src: "{{ _deploy_dir }}/blueprints/{{ item }}"
        dest: "{{ _deploy_dir }}/blueprints-active/{{ item }}"
        remote_src: true
        mode: "0644"
      loop: "{{ _shared_blueprints + (_enabled_apps | map('extract', authentik_app_catalog, 'file') | list) }}"

    - name: "Render zz-sso-bindings from the enabled set"
      ansible.builtin.template:
        src: "{{ _authentik_tpls }}/templates/zz-sso-bindings.yaml.j2"
        dest: "{{ _deploy_dir }}/blueprints-active/zz-sso-bindings.yaml"
        mode: "0644"
      vars:
        authentik_apps: "{{ _enabled_apps }}"

    - name: "Create convenience symlink ~/authentik -> deploy dir"
      # Satisfies "a folder for authentik at ~/authentik" while keeping the
      # composable monorepo clone — ~/authentik points at the deployment dir.
      ansible.builtin.file:
        src: "{{ _deploy_dir }}"
        dest: "{{ local_home_dir | default('/home/' ~ (ansible_user | default('deploy')), true) }}/{{ service_name }}"
        state: link
        force: true
      register: _symlink_result
      # Best-effort: tolerate a permission-denied home, surface any other failure.
      failed_when: >-
        _symlink_result is failed
        and 'permission denied' not in (_symlink_result.msg | default('') | lower)

# ── Phase 2: Container lifecycle ────────────────────────────────────────────
- name: "Phase 2: Start authentik"
  hosts: authentik_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ (ansible_user | default('deploy')) ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"

  tasks:
    - name: "Run deploy.sh (container lifecycle)"
      ansible.builtin.shell: |
        cd "{{ _deploy_dir }}"
        bash deploy.sh
      environment:
        CONTAINER_ENGINE: "{{ container_engine | default('podman') }}"
        LOCAL_MODE: "{{ 'true' if (local_mode | default(false) | bool) else '' }}"
        # Force the compose provider on the Mac-direct genesis path (§12A fix #1).
        # Empty on the Semaphore path; detect_runtime derives ([ -z ]). NOT
        # default(omit) — omit leaks its placeholder into environment (rc 127).
        COMPOSE_CMD: "{{ local_compose_cmd | default('') }}"
      register: _deploy
      changed_when: true

    - name: "Show deploy.sh output"
      ansible.builtin.debug:
        var: _deploy.stdout_lines

# ── Phase 3: Verify ─────────────────────────────────────────────────────────
- name: "Phase 3: Verify authentik"
  hosts: authentik_svc
  gather_facts: false
  become: false
  vars:
    _engine: "{{ container_engine | default('podman') }}"

  tasks:
    - name: "Server healthcheck (ak healthcheck)"
      ansible.builtin.command: "{{ _engine }} exec authentik-server ak healthcheck"
      register: _ak_health
      changed_when: false
      retries: 5
      delay: 6
      until: _ak_health.rc == 0

    - name: "API answers (unauthenticated root config endpoint -> 200)"
      ansible.builtin.command: >-
        {{ _engine }} exec authentik-server
        python -c "import urllib.request,sys;
        sys.exit(0 if urllib.request.urlopen('http://localhost:9000/api/v3/root/config/', timeout=5).status == 200 else 1)"
      register: _ak_api
      changed_when: false
      retries: 5
      delay: 6
      until: _ak_api.rc == 0

    - name: "Wait for the embedded outpost to serve forward_auth (proxy-provider sync)"
      # `ak healthcheck` + the API go green BEFORE the embedded outpost finishes
      # loading proxy providers from the blueprints, so for ~a minute after deploy
      # the forward_auth gates 404 (they look broken right after a deploy/genesis,
      # and the smoke test races the sync). Gate the deploy on the gate actually
      # working: probe the outpost's Caddy auth endpoint for a committed
      # proxy-provider host until it issues the auth redirect (302). Host +
      # X-Forwarded-Proto=https are exactly what Caddy's forward_auth sends; the
      # host must match a committed forward_auth blueprint's external_host
      # (netbox-forward-auth.yaml: netbox.agent-cloud.test:8443). http.client (not
      # urllib) so the 302 is returned, not followed to the TLS-gated IdP.
      ansible.builtin.command: >-
        {{ _engine }} exec authentik-server
        python -c "import http.client,sys;
        c=http.client.HTTPConnection('localhost',9000,timeout=8);
        c.putrequest('GET','/outpost.goauthentik.io/auth/caddy',skip_host=True);
        c.putheader('Host','{{ authentik_outpost_probe_host | default('netbox.agent-cloud.test:8443') }}');
        c.putheader('X-Forwarded-Proto','https');
        c.endheaders();
        sys.exit(0 if c.getresponse().status == 302 else 1)"
      register: _ak_outpost
      changed_when: false
      retries: 20
      delay: 6
      until: _ak_outpost.rc == 0

    - name: "Report"
      ansible.builtin.debug:
        msg: "authentik healthy — server up, API answering on :9000, embedded outpost serving forward_auth (behind Caddy for TLS)."

# ── Phase 4: Render + distribute Caddy fragment (prod only) ─────────────────
# auth.uhstray.io -> this VM:9000, tls internal. Skipped unless a central Caddy
# host (caddy_svc) exists AND not local_mode (local-dev routes the IdP via
# Caddyfile.local's caddy_routes, not a sites/ fragment).
- name: "Phase 4: Render + distribute Caddy fragment"
  hosts: authentik_svc
  gather_facts: false
  become: false
  vars:
    _fragment_src: "/tmp/authentik-caddy-site.caddy"
    _fragment_name: "authentik.caddy"
    # Composable sites/ model only. A flat hand-managed Caddyfile sets
    # caddy_composable=false and gets its routes via manage-caddy-sites.yml.
    _has_caddy: "{{ (groups['caddy_svc'] | default([]) | length > 0) and not (local_mode | default(false) | bool) and (caddy_composable | default(true) | bool) }}"

  tasks:
    - name: "Require public host + upstream vars before distributing to Caddy"
      ansible.builtin.assert:
        that:
          - authentik_public_host is defined
          - authentik_caddy_upstream is defined
        fail_msg: >-
          Set authentik_public_host and authentik_caddy_upstream in inventory
          before enabling Caddy distribution.
      when: _has_caddy | bool

    - name: "Render caddy-site.j2 to the Authentik host"
      # src resolved on the CONTROLLER (checked-out monorepo), not the remote clone.
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../services/authentik/deployment/templates/caddy-site.j2"
        dest: "{{ _fragment_src }}"
        mode: "0644"
      when: _has_caddy | bool

    - name: "Push fragment to central Caddy + reload"
      ansible.builtin.include_tasks: tasks/distribute-caddy-site.yml
      when: _has_caddy | bool

    - name: "Note when Caddy distribution is skipped"
      ansible.builtin.debug:
        msg: "No caddy_svc host in inventory (or local_mode) — skipping central-Caddy fragment distribution."
      when: not (_has_caddy | bool)

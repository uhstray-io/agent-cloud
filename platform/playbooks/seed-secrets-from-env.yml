---
# seed-secrets-from-env.yml — One-time migration: read .env from pre-monorepo
# VM deployment and store secrets in OpenBao for composable pattern.
#
# Reads the existing .env file from the standalone deployment directory,
# maps the env var names to the composable secret names, and stores
# everything in OpenBao.
#
# Usage: -e "target_service=nocodb_svc"

- name: "Seed OpenBao from pre-monorepo .env for {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: false
  become: false
  vars:
    target_service: "ungrouped"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"

    _env_file_map:
      nocodb:
        env_path: "/home/{{ ansible_user }}/nocodb/.env"
        secret_mapping:
          POSTGRES_PASSWORD: nocodb_pg_password
      n8n:
        env_path: "/home/{{ ansible_user }}/n8n/.env"
        secret_mapping:
          POSTGRES_PASSWORD: n8n_admin_password
          POSTGRES_NON_ROOT_PASSWORD: n8n_user_password
          ENCRYPTION_KEY: n8n_encryption_key

  tasks:
    - name: "Validate requirements"
      ansible.builtin.assert:
        that:
          - service_name is defined
          - service_name in _env_file_map
          - _bao_url | length > 0
        fail_msg: "service_name must be defined and in {{ _env_file_map.keys() | list }}"

    - name: "Read .env file from VM"
      ansible.builtin.slurp:
        src: "{{ _env_file_map[service_name].env_path }}"
      register: _env_raw

    - name: "Parse .env into dict"
      ansible.builtin.set_fact:
        _env_parsed: >-
          {{ _env_parsed | default({}) | combine({
            (item.split('=', 1)[0]): (item.split('=', 1)[1] | default(''))
          }) }}
      loop: "{{ (_env_raw.content | b64decode).split('\n') | select('match', '^[A-Z]') | list }}"
      no_log: true

    - name: "Map env vars to composable secret names"
      ansible.builtin.set_fact:
        _secrets: >-
          {{ _secrets | default({}) | combine({
            (item.value): _env_parsed[item.key]
          }) }}
      loop: "{{ _env_file_map[service_name].secret_mapping | dict2items }}"
      when: item.key in _env_parsed
      no_log: true

    - name: "Add service URL"
      ansible.builtin.set_fact:
        _secrets: "{{ _secrets | combine({'url': service_url | default('')}) }}"
      when: service_url is defined

    - name: "Report mapped secrets (names only)"
      ansible.builtin.debug:
        msg: "Mapped {{ _secrets | length }} secrets: {{ _secrets.keys() | list }}"

    - name: "Authenticate to OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/auth/approle/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ _bao_role_id }}"
          secret_id: "{{ _bao_secret_id }}"
        status_code: [200]
      register: _bao_auth
      delegate_to: localhost
      no_log: true

    - name: "Check existing secrets in OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        status_code: [200, 404]
      register: _existing
      delegate_to: localhost
      no_log: true

    - name: "Report existing keys"
      ansible.builtin.debug:
        msg: >-
          Existing in OpenBao: {{ (_existing.json.data.data | default({})).keys() | list
          if _existing.status == 200 else 'NONE (404)' }}

    - name: "Merge new secrets with existing (preserve existing values)"
      ansible.builtin.set_fact:
        _merged: "{{ (_existing.json.data.data | default({})) | combine(_secrets) }}"
      no_log: true

    - name: "Store merged secrets in OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        body_format: json
        body:
          data: "{{ _merged }}"
        status_code: [200]
      delegate_to: localhost
      no_log: true

    - name: "Verify"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        status_code: [200]
      register: _verify
      delegate_to: localhost
      no_log: true

    - name: "Seed complete"
      ansible.builtin.debug:
        msg: >-
          {{ service_name }}: {{ _verify.json.data.data.keys() | list | length }} secrets
          now in OpenBao at secret/services/{{ service_name }}.
          Keys: {{ _verify.json.data.data.keys() | list | sort }}

---
# manage-diode-credentials.yml — Always create fresh Diode orb-agent credentials
#
# The Diode plugin only returns client_secret at creation time. list_clients
# never exposes it. Therefore we always create a new credential and store it
# in OpenBao with a timestamp. Old credentials are deleted first.
#
# Expected variables:
#   service_name, monorepo_deploy_path, _monorepo_dir
#   container_engine (docker or podman)
#   _bao_url, _bao_role_id, _bao_secret_id

- name: "Detect container name separator"
  ansible.builtin.set_fact:
    _sep: "{{ (container_engine | default('docker') == 'podman') | ternary('_', '-') }}"

- name: "Delete existing orb-agent credentials from Diode plugin"
  ansible.builtin.shell: |
    set -o pipefail
    {{ container_engine | default('docker') }} exec netbox{{ _sep }}netbox{{ _sep }}1 \
      /opt/netbox/netbox/manage.py shell -c "
    import json
    from netbox_diode_plugin.client import list_clients
    clients = list_clients(None)
    orb_clients = [c for c in clients if 'orb-agent' in c.get('client_name', '')]
    print(json.dumps({'deleted': len(orb_clients), 'ids': [c['client_id'] for c in orb_clients]}))
    " 2>/dev/null | grep '^{'
  args:
    executable: /bin/bash   # `set -o pipefail` needs bash (Ubuntu /bin/sh is dash)
  register: _old_creds
  changed_when: false
  failed_when: _old_creds.rc not in [0, 1]

- name: "Report old credentials"
  ansible.builtin.debug:
    msg: "Found {{ (_old_creds.stdout | default('{}') | from_json).get('deleted', 0) }} existing orb-agent credential(s)"

- name: "Create fresh orb-agent credential via Diode plugin"
  ansible.builtin.shell: |
    set -o pipefail
    {{ container_engine | default('docker') }} exec netbox{{ _sep }}netbox{{ _sep }}1 \
      /opt/netbox/netbox/manage.py shell -c "
    import json
    from netbox_diode_plugin.client import create_client
    result = create_client(None, 'orb-agent', 'diode:ingest')
    print(json.dumps(result))
    " 2>/dev/null | grep '^{'
  args:
    executable: /bin/bash   # `set -o pipefail` needs bash (Ubuntu /bin/sh is dash)
  register: _new_creds
  failed_when: _new_creds.stdout | length == 0

- name: "Parse new credentials"
  ansible.builtin.set_fact:
    _orb_client_id: "{{ (_new_creds.stdout | from_json).client_id }}"
    _orb_client_secret: "{{ (_new_creds.stdout | from_json).client_secret }}"
    _orb_created_at: "{{ (_new_creds.stdout | from_json).created_at | default(ansible_date_time.iso8601 | default('')) }}"
  no_log: true

- name: "Credential created"
  ansible.builtin.debug:
    msg: "Created orb-agent credential: {{ _orb_client_id }} at {{ _orb_created_at }}"

- name: "Authenticate to OpenBao"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ _bao_role_id }}"
      secret_id: "{{ _bao_secret_id }}"
    status_code: [200]
  register: _bao_auth
  delegate_to: localhost
  no_log: true

- name: "Store credentials in OpenBao (with timestamp)"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
    method: PATCH
    headers:
      X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
      Content-Type: "application/merge-patch+json"
    body_format: json
    body:
      data:
        orb_agent_client_id: "{{ _orb_client_id }}"
        orb_agent_client_secret: "{{ _orb_client_secret }}"
        orb_agent_created_at: "{{ _orb_created_at }}"
    status_code: [200]
  delegate_to: localhost
  no_log: true

- name: "Update .env with credentials"
  ansible.builtin.lineinfile:
    path: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}/.env"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  loop:
    - { key: "ORB_AGENT_CLIENT_ID", value: "{{ _orb_client_id }}" }
    - { key: "ORB_AGENT_CLIENT_SECRET", value: "{{ _orb_client_secret }}" }
  loop_control:
    label: "{{ item.key }}"
  no_log: true

- name: "Report"
  ansible.builtin.debug:
    msg: "Diode orb-agent: {{ _orb_client_id }} (created {{ _orb_created_at }}, stored in OpenBao)"

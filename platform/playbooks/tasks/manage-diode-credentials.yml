---
# manage-diode-credentials.yml — Create/verify Diode plugin orb-agent credentials
#
# Always checks the PLUGIN's client list first (source of truth for active
# credentials), not OpenBao. OpenBao may have stale credentials from a
# previous deployment whose Hydra database was wiped.
#
# Chain: plugin → diode-auth → Hydra → credential created → stored in OpenBao
#
# Expected variables:
#   service_name, monorepo_deploy_path, _monorepo_dir
#   container_engine (docker or podman)
#   _bao_url, _bao_role_id, _bao_secret_id

- name: "Detect container name separator"
  ansible.builtin.set_fact:
    _sep: "{{ (container_engine | default('docker') == 'podman') | ternary('_', '-') }}"

- name: "List existing Diode plugin clients (source of truth)"
  ansible.builtin.shell: |
    {{ container_engine | default('docker') }} exec netbox{{ _sep }}netbox{{ _sep }}1 \
      /opt/netbox/netbox/manage.py shell -c "
    import json
    from netbox_diode_plugin.client import list_clients
    clients = list_clients(None)
    matching = [c for c in clients if 'orb-agent' in c.get('client_name', '')]
    print(json.dumps(matching[0] if matching else {}))
    " 2>/dev/null | grep '^{'
  register: _plugin_creds
  changed_when: false
  failed_when: false

- name: "Determine if credential exists in plugin"
  ansible.builtin.set_fact:
    _plugin_has_cred: "{{ (_plugin_creds.stdout | default('{}') | from_json).get('client_id', '') | length > 0 }}"

- name: "Create orb-agent credential via Diode plugin"
  ansible.builtin.shell: |
    {{ container_engine | default('docker') }} exec netbox{{ _sep }}netbox{{ _sep }}1 \
      /opt/netbox/netbox/manage.py shell -c "
    import json
    from netbox_diode_plugin.client import create_client
    result = create_client(None, 'orb-agent', 'diode:ingest')
    print(json.dumps(result))
    " 2>/dev/null | grep '^{'
  register: _new_creds
  when: not _plugin_has_cred

- name: "Set credentials from new creation"
  ansible.builtin.set_fact:
    _orb_client_id: "{{ (_new_creds.stdout | from_json).client_id }}"
    _orb_client_secret: "{{ (_new_creds.stdout | from_json).client_secret }}"
  when: _new_creds is changed
  no_log: true

- name: "Set credentials from existing plugin"
  ansible.builtin.set_fact:
    _orb_client_id: "{{ (_plugin_creds.stdout | from_json).client_id }}"
    _orb_client_secret: "{{ (_plugin_creds.stdout | from_json).client_secret | default('') }}"
  when: _plugin_has_cred
  no_log: true

- name: "Authenticate to OpenBao"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ _bao_role_id }}"
      secret_id: "{{ _bao_secret_id }}"
    status_code: [200]
  register: _bao_auth
  delegate_to: localhost
  no_log: true
  when: _orb_client_id is defined and _orb_client_id | length > 0

- name: "Store orb-agent credentials in OpenBao"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
    method: PATCH
    headers:
      X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
      Content-Type: "application/merge-patch+json"
    body_format: json
    body:
      data:
        orb_agent_client_id: "{{ _orb_client_id }}"
        orb_agent_client_secret: "{{ _orb_client_secret }}"
    status_code: [200]
  delegate_to: localhost
  no_log: true
  when: _orb_client_id is defined and _orb_client_id | length > 0

- name: "Update .env with orb-agent credentials"
  ansible.builtin.lineinfile:
    path: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}/.env"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  loop:
    - { key: "ORB_AGENT_CLIENT_ID", value: "{{ _orb_client_id }}" }
    - { key: "ORB_AGENT_CLIENT_SECRET", value: "{{ _orb_client_secret }}" }
  loop_control:
    label: "{{ item.key }}"
  no_log: true
  when: _orb_client_id is defined and _orb_client_id | length > 0

- name: "Report"
  ansible.builtin.debug:
    msg: >-
      Diode orb-agent: {{ _orb_client_id | default('NONE') }}
      ({{ 'created' if _new_creds is changed else 'existing' }})

---
# distribute-ca-root.yml — copy the step-ca ROOT cert into a consuming service's
# deploy dir so the service can TRUST internal TLS. Companion to
# mint-internal-cert.yml: that distributes the wildcard LEAF (for serving TLS);
# this distributes the ROOT (for verifying it). The OIDC-reachability enabler
# needs both — an in-network OIDC client (ERPNext/Semaphore/…) reaches the IdP
# at https://auth.<zone>:8443 (Caddy's step-ca-minted leaf) and must trust the
# step-ca root to verify that TLS.
#
# The root cert is NON-SECRET (it's the public trust anchor — distributable).
# Co-located single-host case (no delegate_to): the `cp` runs on the play host
# against the local podman, writing to the shared deploy dir.
#
# Required vars:
#   _ca_root_dest_dir   consuming service's deploy dir; root lands in
#                       <dir>/certs/step-ca-root.crt
# Optional vars:
#   _ca_engine          container engine (default: podman)
#   _ca_name            step-ca container name (default: step-ca)

- name: "Assert the CA is reachable before copying its root"
  ansible.builtin.command: "{{ _ca_engine | default('podman') }} container exists {{ _ca_name | default('step-ca') }}"
  register: _ca_root_present
  changed_when: false
  failed_when: _ca_root_present.rc != 0

- name: "Ensure the consumer's certs dir exists"
  ansible.builtin.file:
    path: "{{ _ca_root_dest_dir }}/certs"
    state: directory
    mode: "0755"

- name: "Build a step-ca trust bundle (root + intermediate) in {{ _ca_root_dest_dir }}/certs"
  # Caddy serves the leaf only, so a client needs BOTH the intermediate and the
  # root to build the chain (leaf -> intermediate -> root). Concatenate them into
  # one bundle and make it 0644 — the cert chain is public (non-secret) and the
  # unprivileged service user must read it (podman cp preserves the CA's 0600,
  # which the service user can't read). Idempotent (re-mints the same bundle).
  ansible.builtin.shell: |
    set -o pipefail
    ENG="{{ _ca_engine | default('podman') }}"
    CA="{{ _ca_name | default('step-ca') }}"
    DEST="{{ _ca_root_dest_dir }}/certs"
    $ENG cp "$CA:/home/step/certs/root_ca.crt" "$DEST/.root.crt"
    $ENG cp "$CA:/home/step/certs/intermediate_ca.crt" "$DEST/.intermediate.crt"
    cat "$DEST/.root.crt" "$DEST/.intermediate.crt" > "$DEST/step-ca-bundle.crt"
    rm -f "$DEST/.root.crt" "$DEST/.intermediate.crt"
    chmod 0644 "$DEST/step-ca-bundle.crt"
  changed_when: true

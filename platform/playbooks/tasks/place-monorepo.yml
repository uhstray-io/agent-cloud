---
# place-monorepo.yml — put the agent-cloud monorepo on the target and ensure the
# podman/compose entrypoint. The shared Phase-1 preamble for composable service
# deploys (deploy-dns, deploy-uhhcraft, and future services — ERPNext, OPA).
#
# Two modes, selected by local_mode:
#   prod  (unset/false): git clone/update from monorepo_repo at _branch.
#   local (true):        copy the read-only working-tree mount
#                        (local_workspace_dir) — local tasks must test
#                        UNCOMMITTED changes, and the Semaphore container has no
#                        sudo/apt. The same compose entrypoint is ensured either
#                        way.
#
# Expects in the including play's scope:
#   _monorepo_dir          — where the repo lands on the target
#   _branch                — service_branch | default('main')  (prod clone)
#   monorepo_repo          — clone URL                          (prod only)
#   local_workspace_dir    — RO working-tree mount path         (local only)
#   local_mode             — bool (inventory)
#
# DRY: edit the placement logic HERE, never per service (CLAUDE.md Engineering
# Principles — reuse over per-service glue).

- name: "Assert required variables for monorepo placement"
  ansible.builtin.assert:
    that:
      - _monorepo_dir is defined
      - (_branch is defined) or (local_mode | default(false) | bool)
      - (monorepo_repo is defined) or (local_mode | default(false) | bool)
      - (local_workspace_dir is defined) or not (local_mode | default(false) | bool)
    fail_msg: "Missing required variables for place-monorepo.yml"

- name: "Install git if needed"
  ansible.builtin.apt:
    name: git
    state: present
  become: true
  when: not (local_mode | default(false) | bool)

- name: "Clone or update agent-cloud monorepo"
  ansible.builtin.git:
    repo: "{{ monorepo_repo }}"
    dest: "{{ _monorepo_dir }}"
    version: "{{ _branch }}"
    force: true
  when: not (local_mode | default(false) | bool)

- name: "Copy working tree into place (local mode)"
  # rsync --delete (not tar): tar is additive — it overlays the source but never
  # removes files deleted from it, so a removed deploy input (e.g. a retired
  # blueprint) rots in the clone forever and keeps getting applied. --delete
  # mirrors the source so deletions propagate.
  #
  # Two classes of file must NOT be deleted, and `--filter=':- .gitignore'` (rsync
  # honours each dir's .gitignore as exclude rules) covers both without us
  # enumerating them: per-deploy rendered artifacts (.env, Caddyfile.local,
  # certs/, config/ …) are gitignored, so they're neither copied nor deleted —
  # they're regenerated post-placement by manage-secrets / the deploy. The
  # explicit excludes: .git is never gitignored, so its exclude is load-bearing;
  # .remember/, secrets/, netbox-docker/ ARE gitignored (the filter already skips
  # them) but are listed explicitly as belt-and-suspenders — a missing or edited
  # .gitignore must never leak host-only (.remember, mode 700), mode-600 secrets/
  # (creds come from OpenBao anyway), or the large netbox-docker/ upstream clone.
  # No -o/-g (like tar): ownership becomes this uid.
  ansible.builtin.shell: |
    set -euo pipefail
    mkdir -p "{{ _monorepo_dir }}"
    rsync -rlpti --delete \
      --filter=':- .gitignore' \
      --exclude .git --exclude .remember --exclude secrets --exclude netbox-docker \
      "{{ local_workspace_dir }}/" "{{ _monorepo_dir }}/"
  when: local_mode | default(false) | bool
  register: _rsync_result
  changed_when: _rsync_result.stdout | length > 0

- name: "Ensure podman + compose entrypoint"
  # Sibling task in this directory; resolves relative to this file.
  ansible.builtin.include_tasks: install-podman-compose.yml

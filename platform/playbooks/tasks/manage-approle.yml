---
# manage-approle.yml — Create/update an OpenBao AppRole and policy
#
# Idempotent: creates the policy and role if they don't exist,
# updates them if they do. Returns the role_id and secret_id.
#
# Expected variables:
#   _bao_url, _bao_role_id, _bao_secret_id (existing admin-level AppRole for auth)
#   _approle_name       — name for the new AppRole (e.g., "orb-agent")
#   _approle_policy     — HCL policy content (what paths this role can access)
#   _approle_token_ttl  — token TTL (default: "30m")
#   _approle_secret_id_ttl   — secret_id TTL (default: "2160h" = 90d). Bounded per
#                              PRINCIPLES.md Section 3 ("TTL=0 is a defect"); the only
#                              unlimited-TTL exception is the Semaphore orchestrator.
#   _approle_token_num_uses  — secret_id use cap (default: 25)

- name: "Authenticate to OpenBao (admin)"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ _bao_role_id }}"
      secret_id: "{{ _bao_secret_id }}"
    status_code: [200]
  register: _admin_auth
  delegate_to: localhost
  no_log: true

- name: "Create or update policy for {{ _approle_name }}"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/sys/policies/acl/{{ _approle_name }}"
    method: PUT
    headers:
      X-Vault-Token: "{{ _admin_auth.json.auth.client_token }}"
    body_format: json
    body:
      policy: "{{ _approle_policy }}"
    status_code: [200, 204]
  delegate_to: localhost

- name: "Ensure AppRole auth is enabled"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/sys/auth"
    method: GET
    headers:
      X-Vault-Token: "{{ _admin_auth.json.auth.client_token }}"
    status_code: [200]
  register: _auth_methods
  delegate_to: localhost

- name: "Create or update AppRole — {{ _approle_name }}"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/auth/approle/role/{{ _approle_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ _admin_auth.json.auth.client_token }}"
    body_format: json
    body:
      token_policies:
        - "{{ _approle_name }}"
      token_ttl: "{{ _approle_token_ttl | default('30m') }}"
      token_max_ttl: "{{ _approle_token_max_ttl | default('2h') }}"
      # Bounded by default per PRINCIPLES.md Section 3 (TTL=0 is a defect). The ENFORCED
      # bound is secret_id_ttl (90d — forces rotation). secret_id_num_uses caps SecretID
      # *logins*; token_num_uses caps the *issued token*. A caller may override; the sole
      # unlimited-secret_id_ttl exception is the Semaphore orchestrator.
      secret_id_ttl: "{{ _approle_secret_id_ttl | default('2160h') }}"
      # 0 = unlimited logins WITHIN the TTL window. Default 0 because runtime-auth roles
      # (e.g. orb-agent) re-login as tokens expire — a low SecretID-use cap would lock
      # them out. Set per role once its login frequency / a renewal path is known.
      secret_id_num_uses: "{{ _approle_secret_id_num_uses | default(0) }}"
      token_num_uses: "{{ _approle_token_num_uses | default(25) }}"
    status_code: [200, 204]
  delegate_to: localhost

- name: "Get role_id"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/auth/approle/role/{{ _approle_name }}/role-id"
    method: GET
    headers:
      X-Vault-Token: "{{ _admin_auth.json.auth.client_token }}"
    status_code: [200]
  register: _role_id_resp
  delegate_to: localhost

- name: "Read existing stored credentials (idempotency read-guard)"
  # Avoid minting a fresh, orphaned secret_id on every run: only generate one when
  # none is already stored. (Expiry-driven re-generation is the rotation playbook's job.)
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/secret/data/services/approles/{{ _approle_name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ _admin_auth.json.auth.client_token }}"
    status_code: [200, 404]
  register: _existing_creds
  delegate_to: localhost
  no_log: true

- name: "Generate secret_id (only when none is already stored)"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/auth/approle/role/{{ _approle_name }}/secret-id"
    method: POST
    headers:
      X-Vault-Token: "{{ _admin_auth.json.auth.client_token }}"
    body_format: json
    body: {}
    status_code: [200]
  register: _secret_id_resp
  delegate_to: localhost
  no_log: true
  when: >-
    (_existing_creds.status | default(404)) != 200
    or (_existing_creds.json.data.data.secret_id | default('')) | length == 0

- name: "Set AppRole credentials (reuse the stored secret_id when present)"
  ansible.builtin.set_fact:
    _new_role_id: "{{ _role_id_resp.json.data.role_id }}"
    _new_secret_id: "{{ _secret_id_resp.json.data.secret_id if (_secret_id_resp is not skipped) else _existing_creds.json.data.data.secret_id }}"
  no_log: true

- name: "Store AppRole credentials in OpenBao (only when a new secret_id was generated)"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/secret/data/services/approles/{{ _approle_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ _admin_auth.json.auth.client_token }}"
    body_format: json
    body:
      data:
        role_id: "{{ _new_role_id }}"
        secret_id: "{{ _new_secret_id }}"
    status_code: [200]
  delegate_to: localhost
  no_log: true
  when: _secret_id_resp is not skipped

- name: "AppRole provisioned"
  ansible.builtin.debug:
    msg: "AppRole '{{ _approle_name }}' ready (secret_id reused if already present). Credentials at secret/services/approles/{{ _approle_name }}"

---
# clone-and-deploy.yml — Shared task list for monorepo-based service deployment
#
# Expected variables (from inventory or extra vars):
#   monorepo_repo         — HTTPS git URL (public repo, no credentials needed)
#   monorepo_deploy_path  — Path within monorepo (e.g., platform/services/nocodb/deployment)
#   service_name          — Short name for the service (e.g., nocodb)
#   service_url           — Base URL for health check (optional)
#   health_path           — Health endpoint path (optional)
#   health_status_codes   — Accepted HTTP codes (default [200])
#   openbao_addr          — OpenBao address for deploy.sh (via _bao_url)

- name: "Install git if needed"
  ansible.builtin.apt:
    name: git
    state: present
  become: true

- name: "Clone or update agent-cloud monorepo"
  ansible.builtin.git:
    repo: "{{ monorepo_repo }}"
    dest: "{{ _monorepo_dir }}"
    version: "{{ _branch }}"
    force: true
  become: false

- name: "Create convenience symlink ~/{{ service_name }}"
  ansible.builtin.file:
    src: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    dest: "{{ ansible_env.HOME | default('/home/' + ansible_user) }}/{{ service_name }}"
    state: link
    force: true
  become: false
  ignore_errors: true

- name: "Run {{ service_name }} deploy.sh"
  ansible.builtin.shell: |
    cd "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    bash deploy.sh
  become: false
  environment:
    CONTAINER_ENGINE: "{{ container_engine | default('') }}"
    OPENBAO_ADDR: "{{ _bao_url }}"
    BAO_ROLE_ID: "{{ _bao_role_id | default('') }}"
    BAO_SECRET_ID: "{{ _bao_secret_id | default('') }}"
    NOCODB_URL: "{{ nocodb_url | default('') }}"
    N8N_URL: "{{ n8n_url | default('') }}"
    SEMAPHORE_URL: "{{ semaphore_url | default('') }}"
    PROXMOX_URL: "{{ proxmox_url | default('') }}"
    PROXMOX_TOKEN_ID: "{{ proxmox_token_id | default('') }}"
  register: deploy_result
  changed_when: true

- name: "Show deploy output"
  ansible.builtin.debug:
    var: deploy_result.stdout_lines

- name: "Verify {{ service_name }} health"
  ansible.builtin.uri:
    url: "{{ service_url }}{{ health_path }}"
    method: GET
    status_code: "{{ health_status_codes | default([200]) }}"
    validate_certs: false
  register: health
  retries: 5
  delay: 5
  when: health_path is defined and service_url is defined

- name: "{{ service_name }} status"
  ansible.builtin.debug:
    msg: "{{ service_name }} at {{ service_url | default('N/A') }} — {{ 'healthy' if (health is succeeded or health is skipped) else 'check failed' }}"

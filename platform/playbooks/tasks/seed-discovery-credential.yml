---
# seed-discovery-credential.yml — Copy/update one credential set at discovery/* path
#
# Expected variables (from loop_var 'migration'):
#   migration.name      — human-readable name
#   migration.src_path  — source vault path (KV v2 data/ prefix)
#   migration.dest_path — destination vault path (KV v2 data/ prefix)
#   migration.fields    — list of field names to copy (all if empty)
#   migration.overrides — dict of field overrides applied after copy (optional)
#
# From parent playbook:
#   _bao_auth           — authenticated vault token
#   _bao_url            — OpenBao address

- name: "Read {{ migration.name }} from source"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/{{ migration.src_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
    status_code: [200]
  register: _src_data
  delegate_to: localhost
  no_log: true

- name: "Filter fields for {{ migration.name }}"
  ansible.builtin.set_fact:
    _filtered_data: >-
      {%- set src = _src_data.json.data.data -%}
      {%- if migration.fields | length > 0 -%}
        {{ src | dict2items | selectattr('key', 'in', migration.fields) | items2dict }}
      {%- else -%}
        {{ src }}
      {%- endif -%}
  no_log: true

- name: "Apply overrides for {{ migration.name }}"
  ansible.builtin.set_fact:
    _filtered_data: "{{ _filtered_data | combine(migration.overrides) }}"
  when: migration.overrides is defined and migration.overrides | length > 0
  no_log: true

- name: "Write {{ migration.name }} to {{ migration.dest_path }}"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/{{ migration.dest_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
    body_format: json
    body:
      data: "{{ _filtered_data }}"
    status_code: [200, 204]
  delegate_to: localhost
  no_log: true

- name: "{{ migration.name }} — written successfully"
  ansible.builtin.debug:
    msg: "Wrote {{ _filtered_data.keys() | list }} to {{ migration.dest_path }}"

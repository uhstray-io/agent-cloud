---
# seed-discovery-credential.yml — Copy one credential set to discovery/* path
#
# Expected variables (from loop_var 'migration'):
#   migration.name      — human-readable name
#   migration.src_path  — source vault path (KV v2 data/ prefix)
#   migration.dest_path — destination vault path (KV v2 data/ prefix)
#   migration.fields    — list of field names to copy (all if empty)
#
# From parent playbook:
#   _bao_auth           — authenticated vault token
#   _bao_url            — OpenBao address

- name: "Check if {{ migration.name }} already exists at destination"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/{{ migration.dest_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
    status_code: [200, 404]
  register: _dest_check
  delegate_to: localhost
  no_log: true

- name: "{{ migration.name }} — destination already populated, skipping"
  ansible.builtin.debug:
    msg: "{{ migration.dest_path }} already exists with keys: {{ _dest_check.json.data.data.keys() | list }}"
  when: _dest_check.status == 200

- name: "Migrate {{ migration.name }} credentials"
  when: _dest_check.status == 404
  block:
    - name: "Read {{ migration.name }} from source"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/{{ migration.src_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        status_code: [200]
      register: _src_data
      delegate_to: localhost
      no_log: true

    - name: "Filter fields for {{ migration.name }}"
      ansible.builtin.set_fact:
        _filtered_data: >-
          {%- set src = _src_data.json.data.data -%}
          {%- if migration.fields | length > 0 -%}
            {{ src | dict2items | selectattr('key', 'in', migration.fields) | items2dict }}
          {%- else -%}
            {{ src }}
          {%- endif -%}
      no_log: true

    - name: "Write {{ migration.name }} to {{ migration.dest_path }}"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/{{ migration.dest_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        body_format: json
        body:
          data: "{{ _filtered_data }}"
        status_code: [200, 204]
      delegate_to: localhost
      no_log: true

    - name: "{{ migration.name }} — migrated successfully"
      ansible.builtin.debug:
        msg: "Copied {{ _filtered_data.keys() | list }} from {{ migration.src_path }} to {{ migration.dest_path }}"

---
# manage-secrets.yml — OpenBao-driven secret lifecycle
#
# 1. Fetches existing secrets from OpenBao (reuses if present)
# 2. Generates missing secrets (random/django, per _secret_definitions)
# 3. Stores all secrets back to OpenBao (source of truth)
# 4. Templates env files on VM from secrets (compose-ready)
#
# Expected variables:
#   service_name, monorepo_deploy_path, _monorepo_dir
#   _bao_url, _bao_role_id, _bao_secret_id
#   _secret_definitions  — [{name, type, length}]
#   _env_templates       — [{src, dest}] Jinja2 templates to render
#   _service_url         — stored alongside secrets (optional)

- name: "Authenticate to OpenBao"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ _bao_role_id }}"
      secret_id: "{{ _bao_secret_id }}"
    status_code: [200]
  register: _bao_auth
  delegate_to: localhost
  run_once: true
  no_log: true

- name: "Fetch existing secrets from OpenBao"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
    status_code: [200, 404]
  register: _bao_existing
  delegate_to: localhost
  run_once: true
  no_log: true

- name: "Set existing secrets"
  ansible.builtin.set_fact:
    _existing: "{{ _bao_existing.json.data.data | default({}) }}"
  no_log: true

- name: "Resolve secrets (reuse existing, generate missing)"
  ansible.builtin.set_fact:
    _resolved: >-
      {{ _resolved | default({}) | combine({
        item.name: (
          _existing[item.name]
          if (_existing[item.name] | default('') | length > 0)
          else (
            lookup('password', '/dev/null length=' ~ (item.length | default(32)) ~ ' chars=ascii_letters,digits')
            if item.type == 'random'
            else (
              lookup('password', '/dev/null length=' ~ (item.length | default(50)) ~ ' chars=ascii_letters,digits,.-_')
              if item.type == 'django'
              else ''
            )
          )
        )
      }) }}
  loop: "{{ _secret_definitions }}"
  loop_control:
    label: "{{ item.name }}: {{ 'reuse' if (_existing[item.name] | default('') | length > 0) else item.type }}"
  no_log: true

- name: "Add service URL"
  ansible.builtin.set_fact:
    _resolved: "{{ _resolved | combine({'url': _service_url | default(service_url | default(''))}) }}"
  when: _service_url is defined or service_url is defined

- name: "Store all secrets in OpenBao"
  ansible.builtin.uri:
    url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
    body_format: json
    body:
      data: "{{ _resolved }}"
    status_code: [200]
  delegate_to: localhost
  run_once: true
  no_log: true

- name: "Template env files on VM"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../services/{{ service_name }}/deployment/templates/{{ item.src }}"
    dest: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}/{{ item.dest }}"
    mode: "0600"
  loop: "{{ _env_templates | default([]) }}"
  loop_control:
    label: "{{ item.dest }}"
  vars:
    secrets: "{{ _resolved }}"

- name: "Report"
  ansible.builtin.debug:
    msg: >-
      {{ service_name }}: {{ _resolved | dict2items | selectattr('value') | list | length }} secrets managed,
      {{ _env_templates | default([]) | length }} env files templated

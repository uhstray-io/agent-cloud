---
# seed-discovery-credentials.yml — Populate discovery/* vault paths
#
# Copies existing service credentials to the consolidated discovery/ path
# structure used by orb-agent worker backends. Idempotent — skips paths
# that already exist.
#
# Run via Semaphore (uses inventory for openbao_addr, env for AppRole creds)
# or directly:
#   BAO_ROLE_ID=... BAO_SECRET_ID=... ansible-playbook seed-discovery-credentials.yml
#
# Source paths:
#   secret/services/proxmox       → secret/services/discovery/proxmox_api
#
# The orb-agent AppRole has read access to secret/services/discovery/*
# (see config/policies/orb-agent.hcl).

- name: "Seed discovery credential paths in OpenBao"
  hosts: netbox_svc
  gather_facts: false
  become: false

  vars:
    _bao_url: "{{ openbao_addr | default(lookup('env', 'BAO_ADDR')) | default('http://127.0.0.1:8200', true) }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"

    # Credential migrations: source → destination
    # Each entry copies fields from an existing vault path to a discovery/* path.
    migrations:
      - name: "Proxmox API"
        src_path: "secret/data/services/proxmox"
        dest_path: "secret/data/services/discovery/proxmox_api"
        fields: ["url", "token_id", "api_token"]
        # Override fields after copying from source (fixes stale values)
        overrides:
          token_id: "stray@pve!agent-cloud"

  tasks:
    - name: "Authenticate to OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/auth/approle/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ _bao_role_id }}"
          secret_id: "{{ _bao_secret_id }}"
        status_code: [200]
      register: _bao_auth
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: "Process credential migrations"
      ansible.builtin.include_tasks: tasks/seed-discovery-credential.yml
      loop: "{{ migrations }}"
      loop_control:
        loop_var: migration

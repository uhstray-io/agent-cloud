---
# deploy-uhhcraft.yml — UhhCraft full deploy (composable pattern).
#
# Phase 1: Clone monorepo + verify podman + manage secrets + template .env.
# Phase 2: Run deploy.sh — container lifecycle (podman compose up, wait healthy).
# Phase 3: Run post-deploy.sh — migrations (goose + River) + healthcheck.
# Phase 4: Verify /healthz.
# Phase 5: Render + distribute the central-Caddy fragment (no-op until a
#          caddy_svc host exists in inventory — added in integration Phase 6).
#
# Source of truth: plan/development/WEBSMITH-INTEGRATION-PLAN.md (Phases 4-5).

# ── Phase 1: Clone + Secrets + Env Files ────────────────────────────────────
- name: "Phase 1: Clone repo + manage secrets + template env"
  hosts: uhhcraft_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    _branch: "{{ service_branch | default('main') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"
    _service_url: "{{ service_url | default('http://localhost:3000') }}"
    # Secret names == the keys env.j2 reads via {{ secrets.<name> }}, which in
    # turn feed the env keys config.go requireEnv()s. Keep this list, env.j2,
    # and config.go in lockstep.
    _secret_definitions:
      # Backing services
      - { name: postgres_password, type: random, length: 32 }
      - { name: redis_password, type: random, length: 32 }
      - { name: minio_root_user, type: random, length: 16 }
      - { name: minio_root_password, type: random, length: 32 }
      # App secrets
      - { name: session_secret, type: random, length: 64 }
      # Stripe (publishable key ships to the browser but is provisioned here too)
      - { name: stripe_secret_key, type: user }
      - { name: stripe_publishable_key, type: user }
      - { name: stripe_webhook_secret, type: user }
      # Outbound integrations
      - { name: resend_api_key, type: user }
      - { name: discord_orders_webhook_url, type: user }
      - { name: discord_ops_webhook_url, type: user }
      # Shipping (USPS v3 OAuth2 client credentials)
      - { name: usps_client_id, type: user }
      - { name: usps_client_secret, type: user }
      # Fulfillment overflow (optional — empty unless set in OpenBao)
      - { name: printify_api_key, type: user }
      - { name: printify_shop_id, type: user }
      - { name: hubs_api_key, type: user }
    _env_templates:
      - { src: env.j2, dest: .env, mode: "0600" }

  tasks:
    # Local-dev (local_mode=true) runs inside the Semaphore container: no
    # sudo/apt, and the source of truth is the read-only working-tree mount
    # (local_workspace_dir), not GitHub — a git clone would silently test
    # committed main instead of the developer's uncommitted changes.
    - name: "Install git if needed"
      ansible.builtin.apt:
        name: git
        state: present
      become: true
      when: not (local_mode | default(false) | bool)

    - name: "Clone or update agent-cloud monorepo"
      ansible.builtin.git:
        repo: "{{ monorepo_repo }}"
        dest: "{{ _monorepo_dir }}"
        version: "{{ _branch }}"
        force: true
      when: not (local_mode | default(false) | bool)

    - name: "Copy working tree into place (local mode)"
      # tar (not cp -a): the workspace mount is owned by the host uid, and a
      # non-root copy must not try to preserve ownership. .git is excluded —
      # deploys don't need history and it dominates the copy size.
      ansible.builtin.shell: |
        set -o pipefail
        mkdir -p "{{ _monorepo_dir }}"
        tar -C "{{ local_workspace_dir }}" --exclude .git -cf - . \
          | tar -C "{{ _monorepo_dir }}" -xf -
      when: local_mode | default(false) | bool
      changed_when: true

    - name: "Ensure podman + compose entrypoint"
      ansible.builtin.include_tasks: tasks/install-podman-compose.yml

    - name: "Convenience symlink"
      ansible.builtin.file:
        src: "{{ _deploy_dir }}"
        dest: "{{ local_home_dir | default('/home/' ~ ansible_user) }}/{{ service_name }}"
        state: link
        force: true
      register: _symlink_result
      # Best-effort convenience symlink: tolerate a permission-denied (some hosts
      # restrict the home dir), but surface any OTHER real failure. The list form
      # ANDs its clauses, which would have swallowed everything except
      # permission-denied — so this is a single explicit boolean instead.
      failed_when: >-
        _symlink_result is failed
        and 'permission denied' not in (_symlink_result.msg | default('') | lower)

    - name: "Manage secrets and template env file"
      ansible.builtin.include_tasks: tasks/manage-secrets.yml

# ── Phase 2: Container lifecycle ────────────────────────────────────────────
- name: "Phase 2: Start UhhCraft containers"
  hosts: uhhcraft_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    _service_url: "{{ service_url | default('http://localhost:3000') }}"

  tasks:
    - name: "Run deploy.sh (container lifecycle)"
      ansible.builtin.shell: |
        cd "{{ _deploy_dir }}"
        bash deploy.sh {{ _service_url }}
      environment:
        CONTAINER_ENGINE: "{{ container_engine | default('podman') }}"
      register: _deploy
      changed_when: true

    - name: "Show deploy.sh output"
      ansible.builtin.debug:
        var: _deploy.stdout_lines

# ── Phase 3: Application bootstrap (migrations + River) ─────────────────────
- name: "Phase 3: Run post-deploy bootstrap"
  hosts: uhhcraft_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    _service_url: "{{ service_url | default('http://localhost:3000') }}"

  tasks:
    - name: "Run post-deploy.sh (migrations + healthcheck)"
      ansible.builtin.shell: |
        cd "{{ _deploy_dir }}"
        UHHCRAFT_URL={{ _service_url }} bash post-deploy.sh
      environment:
        CONTAINER_ENGINE: "{{ container_engine | default('podman') }}"
      register: _post
      changed_when: true

    - name: "Show post-deploy.sh output"
      ansible.builtin.debug:
        var: _post.stdout_lines

# ── Phase 4: Health verification ────────────────────────────────────────────
- name: "Phase 4: Verify UhhCraft is healthy"
  hosts: uhhcraft_svc
  gather_facts: false
  become: false
  vars:
    _service_url: "{{ service_url | default('http://localhost:3000') }}"

  tasks:
    - name: "Verify /healthz endpoint"
      ansible.builtin.uri:
        url: "{{ _service_url }}/healthz"
        status_code: [200]
        validate_certs: false
        timeout: 30
      register: _health
      until: _health.status == 200
      retries: 5
      delay: 10

    - name: "Deployed"
      ansible.builtin.debug:
        msg: "UhhCraft is healthy at {{ _service_url }}"

# ── Phase 5: Render + distribute the central-Caddy fragment ─────────────────
# Verify the app is healthy FIRST (above), then expose it via Caddy. Skipped
# until a central Caddy host (caddy_svc) exists in inventory (added in Phase 6).
- name: "Phase 5: Render + distribute Caddy fragment"
  hosts: uhhcraft_svc
  gather_facts: true              # ansible_default_ipv4 feeds the upstream addresses
  become: false
  vars:
    _fragment_src: "/tmp/uhhcraft-caddy-site.caddy"
    _fragment_name: "uhhcraft.caddy"
    _has_caddy: "{{ (groups['caddy_svc'] | default([])) | length > 0 }}"

  tasks:
    # Cross-service MinIO upstreams are coordinated in INVENTORY, not computed
    # from cross-host facts (this play only gathers the UhhCraft host's facts).
    # Require them explicitly — a silent loopback fallback would render a valid
    # fragment that routes generated-asset requests to the wrong host.
    - name: "Require cross-service MinIO upstreams when distributing to Caddy"
      ansible.builtin.assert:
        that:
          - inference_comfyui_minio_upstream is defined
          - inference_hunyuan3d_minio_upstream is defined
        fail_msg: >-
          Set inference_comfyui_minio_upstream and inference_hunyuan3d_minio_upstream
          (host:port of each sidecar's MinIO) in inventory before enabling Caddy
          distribution (Phase 6).
      when: _has_caddy | bool

    - name: "Render caddy-site.j2 to the UhhCraft host"
      # src is resolved on the CONTROLLER (the checked-out monorepo) — the
      # template module always reads src locally, never from the remote clone.
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../services/uhhcraft/deployment/templates/caddy-site.j2"
        dest: "{{ _fragment_src }}"
        mode: "0644"
      vars:
        # Bucket names self-default inside caddy-site.j2; only the computed
        # domain + upstreams are passed here. (Inventory may still override the
        # bucket vars at the host/group level — the template honors them.)
        uhhcraft_domain: "{{ service_url | default('http://localhost:3000') | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}"
        uhhcraft_upstream: "{{ ansible_default_ipv4.address | default(inventory_hostname) }}:3000"
        uhhcraft_minio_upstream: "{{ ansible_default_ipv4.address | default(inventory_hostname) }}:9000"
        # No loopback fallback — asserted above; fail loud over routing wrong.
        comfyui_minio_upstream: "{{ inference_comfyui_minio_upstream }}"
        hunyuan_minio_upstream: "{{ inference_hunyuan3d_minio_upstream }}"
      when: _has_caddy | bool

    - name: "Push fragment to central Caddy + reload"
      ansible.builtin.include_tasks: tasks/distribute-caddy-site.yml
      when: _has_caddy | bool

    - name: "Note when Caddy distribution is skipped"
      ansible.builtin.debug:
        msg: "No caddy_svc host in inventory — skipping central-Caddy fragment distribution (lands with Phase 6 inventory)."
      when: not (_has_caddy | bool)

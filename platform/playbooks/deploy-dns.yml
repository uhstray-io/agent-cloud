---
# deploy-dns.yml — hickory-dns deploy (composable pattern).
#
# Phase 1: Place repo (clone in prod / workspace copy in local) + render
#          named.toml + zone files + .env from inventory vars. NO secrets in
#          Phase 1 — DNS has no runtime credentials; TSIG for RFC 2136 dynamic
#          updates arrives in prod Phase 2.
# Phase 2: Run deploy.sh — container lifecycle (compose up, wait healthy).
# Phase 3: Verify resolution with dig (wildcard answer + a forwarded name).
#
# Source of truth: plan/development/DNS-SERVER-DEPLOYMENT.md
# (local half: plan/development/LOCAL-DEV-DEPLOYMENT.md §5.1).

# ── Phase 1: Place repo + render config ─────────────────────────────────────
- name: "Phase 1: Place repo + render DNS config"
  hosts: dns_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    _branch: "{{ service_branch | default('main') }}"
    _templates: "{{ playbook_dir }}/../services/dns/deployment/templates"

  tasks:
    # Local-dev (local_mode=true) runs inside the Semaphore container: no
    # sudo/apt, and the source of truth is the read-only working-tree mount
    # (local_workspace_dir), not GitHub. Prod VMs clone as usual.
    - name: "Install git if needed"
      ansible.builtin.apt:
        name: git
        state: present
      become: true
      when: not (local_mode | default(false) | bool)

    - name: "Clone or update agent-cloud monorepo"
      ansible.builtin.git:
        repo: "{{ monorepo_repo }}"
        dest: "{{ _monorepo_dir }}"
        version: "{{ _branch }}"
        force: true
      when: not (local_mode | default(false) | bool)

    - name: "Copy working tree into place (local mode)"
      # tar (not cp -a): the workspace mount is owned by the host uid, and a
      # non-root copy must not preserve ownership. .git is excluded.
      ansible.builtin.shell: |
        set -o pipefail
        mkdir -p "{{ _monorepo_dir }}"
        tar -C "{{ local_workspace_dir }}" --exclude .git --exclude .remember -cf - . \
          | tar -C "{{ _monorepo_dir }}" -xf -
      when: local_mode | default(false) | bool
      changed_when: true

    - name: "Ensure podman + compose entrypoint"
      ansible.builtin.include_tasks: tasks/install-podman-compose.yml

    - name: "Ensure config + zones directories"
      ansible.builtin.file:
        path: "{{ _deploy_dir }}/config/zones"
        state: directory
        mode: "0755"

    - name: "Render named.toml"
      ansible.builtin.template:
        src: "{{ _templates }}/named.toml.j2"
        dest: "{{ _deploy_dir }}/config/named.toml"
        mode: "0644"

    - name: "Render zone file"
      ansible.builtin.template:
        src: "{{ _templates }}/zone.local-dev.j2"
        dest: "{{ _deploy_dir }}/config/zones/{{ dns_zone }}.zone"
        mode: "0644"

    - name: "Render compose .env"
      ansible.builtin.template:
        src: "{{ _templates }}/env.j2"
        dest: "{{ _deploy_dir }}/.env"
        mode: "0644"

# ── Phase 2: Container lifecycle ────────────────────────────────────────────
- name: "Phase 2: Start DNS container"
  hosts: dns_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"

  tasks:
    - name: "Run deploy.sh (container lifecycle)"
      ansible.builtin.shell: |
        cd "{{ _deploy_dir }}"
        bash deploy.sh
      environment:
        CONTAINER_ENGINE: "{{ container_engine | default('podman') }}"
        LOCAL_MODE: "{{ 'true' if (local_mode | default(false) | bool) else '' }}"
      register: _deploy
      changed_when: true

    - name: "Show deploy.sh output"
      ansible.builtin.debug:
        var: _deploy.stdout_lines

# ── Phase 3: Verify resolution ──────────────────────────────────────────────
- name: "Phase 3: Verify resolution"
  hosts: dns_svc
  gather_facts: false
  become: false
  vars:
    _engine: "{{ container_engine | default('podman') }}"

  tasks:
    # Query the running daemon through its own bundled dig (the image ships
    # bind-tools), so the check needs no resolver tooling on the host/container
    # that ran the deploy.
    - name: "Resolve a wildcard name in the zone"
      ansible.builtin.command: >-
        {{ _engine }} exec dns
        dig +short +tcp +time=2 +tries=1 @127.0.0.1 probe.{{ dns_zone }} A
      register: _dig_wild
      changed_when: false
      retries: 5
      delay: 3
      until: _dig_wild.stdout | trim | length > 0

    - name: "Assert the wildcard resolves to the configured target"
      ansible.builtin.assert:
        that:
          - (_dig_wild.stdout | trim) == (dns_wildcard_target | default('127.0.0.1'))
        fail_msg: >-
          probe.{{ dns_zone }} resolved to '{{ _dig_wild.stdout | trim }}',
          expected '{{ dns_wildcard_target | default('127.0.0.1') }}'
        success_msg: "*.{{ dns_zone }} -> {{ _dig_wild.stdout | trim }}"

    - name: "Verify forwarding of an external name"
      ansible.builtin.command: >-
        {{ _engine }} exec dns
        dig +short +tcp +time=3 +tries=2 @127.0.0.1 {{ dns_forward_probe | default('one.one.one.one') }} A
      register: _dig_fwd
      changed_when: false
      failed_when: false

    - name: "Report"
      ansible.builtin.debug:
        msg: >-
          DNS healthy: *.{{ dns_zone }} -> {{ _dig_wild.stdout | trim }};
          forward {{ dns_forward_probe | default('one.one.one.one') }} ->
          {{ _dig_fwd.stdout | trim if (_dig_fwd.stdout | trim | length > 0) else '(no answer — check egress/upstream)' }}

    # Host-side resolver wiring can't run through Semaphore (it's the Mac's
    # /etc/resolver, outside this VM) — point the developer at the idempotent
    # make target instead.
    - name: "Local-dev hint: wire macOS resolution"
      ansible.builtin.debug:
        msg: >-
          To resolve *.{{ dns_zone }} natively on the Mac, run (idempotent):
          make local-dns-resolver
      when: local_mode | default(false) | bool

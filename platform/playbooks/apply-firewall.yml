---
# apply-firewall.yml — Reusable host firewall (UFW) lockdown for a service VM.
#
# Default-deny inbound, allow-outbound. Permits SSH (22) only from admin CIDRs and
# each service's published port only from its intended source (e.g. the central
# Caddy host). Idempotent and re-runnable.
#
# Recovery / break-glass: a guest UFW only filters the VM's NETWORK path. The
# Proxmox web console reaches the VM out-of-band through the hypervisor, so no
# firewall rule can lock you out of the console — if SSH is ever blocked, open the
# Proxmox console and run `ufw disable`. This is what makes locking the network
# path safe (cf. "verify keys before disabling password auth").
#
# Anti-lockout: SSH-allow rules are added BEFORE enabling, then a fresh SSH
# handshake is forced (meta: reset_connection) to prove the firewall didn't lock
# the runner out. Refuses to run without at least one SSH CIDR.
#
# Uses the `ufw` CLI (not community.general.ufw) so no extra collection is needed
# on the Semaphore runner (which installs only collections/requirements.yml).
#
# Inventory (site-config):
#   firewall_ssh_cidrs       REQUIRED list of CIDRs allowed to SSH (group var)
#   firewall_detect_ports    auto-discover the running containers' published host
#                            ports + protocols and allow them from the upstream
#                            (default true) — so the rule tracks whatever the
#                            service serves (8000/tcp, 443/udp, ...) with no
#                            hardcoded port. The container must be running.
#   firewall_upstream_source source allowed to reach the DETECTED ports — the
#                            reverse proxy, e.g. the Caddy host (group var).
#   firewall_allow_rules     optional STATIC extras [{port, proto(=tcp), from, comment}]
#                            for ports to allow regardless of detection (INPUT).
#   firewall_rootful         host runs containers under ROOTFUL podman or Docker
#                            (default: true when container_engine == 'docker', else
#                            false). Rootful/Docker publish ports via DNAT, so the
#                            traffic crosses the FORWARD chain (see below) and the
#                            engine must be queried as root. Set true for rootful
#                            podman hosts (the engine name alone can't reveal it).
#   firewall_route_rules     optional STATIC route (FORWARD-chain) rules, same shape
#                            as firewall_allow_rules. REQUIRED instead of (or with)
#                            firewall_allow_rules on rootful/Docker hosts where
#                            detection is off — a plain INPUT `ufw allow` never
#                            matches a DNAT'd container port. Detected ports get a
#                            matching route rule automatically when firewall_rootful.
#   firewall_allow_bridge_dns  on ROOTFUL PODMAN hosts, allow the DNS port (53/udp+tcp)
#                            into each podman bridge so container name resolution
#                            works. Podman runs aardvark-dns on the bridge GATEWAY (a
#                            host IP), so a container resolving a sibling by name sends
#                            a DNS query INPUT to the host, which default-deny DROPS.
#                            Default true. Docker (in-netns 127.0.0.11 resolver) and
#                            rootless podman (own netns) never cross host UFW — exempt.
#   firewall_verify_ssh      reset-connection check after enable (default true)
#   ICMP echo is left at UFW's default (allowed) so ping-based monitoring works.
#
# Rootful podman / Docker & the FORWARD chain: published container ports are DNAT'd
# to the container's netns, so inbound traffic traverses UFW's `route` (FORWARD)
# chain — which `default deny (routed)` DROPS — not the INPUT chain that `ufw allow`
# governs. Rootless podman instead proxies the port on the host (INPUT), so plain
# allows suffice there. This playbook emits `ufw route allow` rules on rootful/Docker
# hosts (firewall_route_rules + a route mirror of each detected port) so the reverse
# proxy can actually reach the container.
#
# Rootful podman & container DNS (the INPUT chain): podman runs aardvark-dns on each
# bridge's GATEWAY — a host IP — so when a container resolves a sibling by name (e.g.
# semaphore_db), the query is INPUT to the host, which `default deny (incoming)` DROPS;
# netavark adds no INPUT accept for it. Under the lockdown, every NEW container-to-
# container connection that needs name resolution then hangs ~20s and fails. It only
# surfaces on a restart / new connection (warm pooled connections keep working) — a
# classic verify-before-hardening trap. The playbook allows 53/udp+tcp on each podman
# bridge interface (firewall_allow_bridge_dns) to close it. Docker (in-netns 127.0.0.11) and
# rootless podman (own netns) never cross host UFW, so both are exempt.
#
# Usage (via Semaphore): -e target_service=openhands_svc

- name: "Apply UFW firewall to {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: true
  become: true
  vars:
    target_service: "ungrouped"
    _ssh_cidrs: "{{ firewall_ssh_cidrs | default([]) }}"
    _rules: "{{ firewall_allow_rules | default([]) }}"
    _route_rules: "{{ firewall_route_rules | default([]) }}"
    _verify: "{{ firewall_verify_ssh | default(true) | bool }}"
    _engine: "{{ container_engine | default('podman') }}"
    # Rootful podman & Docker publish ports via DNAT, so their traffic crosses the
    # FORWARD chain (needs `ufw route allow`, not just INPUT `ufw allow`) and the
    # engine must be queried as root. Docker is always rootful; rootful podman hosts
    # set firewall_rootful: true (the engine name alone can't distinguish it).
    _rootful: "{{ firewall_rootful | default(_engine == 'docker') | bool }}"
    _allow_bridge_dns: "{{ firewall_allow_bridge_dns | default(true) | bool }}"

  tasks:
    - name: "Skip non-Linux / local-connection hosts (UFW targets real Linux VMs)"
      # local-dev runs services as containers via ansible_connection=local on
      # macOS — there is no per-service Linux host to firewall there.
      ansible.builtin.meta: end_host
      when: >-
        (ansible_system | default('')) != 'Linux'
        or (ansible_connection | default('ssh')) == 'local'

    - name: "Refuse to proceed without SSH allow CIDRs (anti-lockout)"
      ansible.builtin.assert:
        that:
          - _ssh_cidrs | length > 0
        fail_msg: >-
          firewall_ssh_cidrs must list >=1 CIDR, or enabling UFW would lock SSH out.

    - name: "Install ufw"
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: "Allow SSH (22/tcp) from each admin CIDR — BEFORE enabling"  # noqa: command-instead-of-module
      ansible.builtin.command: "ufw allow from {{ item }} to any port 22 proto tcp"
      register: _sshrule
      changed_when: "'Rule added' in _sshrule.stdout or 'Rules updated' in _sshrule.stdout"
      loop: "{{ _ssh_cidrs }}"

    - name: "Allow each STATIC service port from its intended source"  # noqa: command-instead-of-module
      ansible.builtin.command: "ufw allow from {{ item.from }} to any port {{ item.port }} proto {{ item.proto | default('tcp') }}"
      register: _svcrule
      changed_when: "'Rule added' in _svcrule.stdout or 'Rules updated' in _svcrule.stdout"
      loop: "{{ _rules }}"
      loop_control:
        label: "{{ item.port }}/{{ item.proto | default('tcp') }} from {{ item.from }} ({{ item.comment | default('') }})"

    - name: "Allow each STATIC route rule on the FORWARD chain (rootful podman / Docker)"  # noqa: command-instead-of-module
      # Published ports on rootful/Docker are DNAT'd to the container and routed
      # (FORWARD), so a plain `ufw allow` (INPUT) never matches them. These route
      # rules are what actually let the reverse proxy reach the container. Applied
      # whenever provided (the list is empty on rootless hosts), BEFORE enable so
      # the anti-lockout ordering holds. Route rules never affect host SSH (INPUT).
      ansible.builtin.command: "ufw route allow proto {{ item.proto | default('tcp') }} from {{ item.from }} to any port {{ item.port }}"
      register: _routerule
      changed_when: "'Rule added' in _routerule.stdout or 'Rules updated' in _routerule.stdout"
      loop: "{{ _route_rules }}"
      loop_control:
        label: "{{ item.port }}/{{ item.proto | default('tcp') }} from {{ item.from }} (route, {{ item.comment | default('') }})"

    # ── Dynamic upstream allow: discover the published host ports + protocols of
    # the running containers and allow exactly those from the reverse-proxy
    # (Caddy). So a service serving 8000/tcp or 443/udp gets the matching rule
    # automatically — no hardcoded port. `become` follows _rootful: rootless podman
    # containers belong to the service user (become:false), but rootful podman and
    # Docker containers belong to root (become:true) — querying them as the service
    # user finds NOTHING, so detection would silently yield no rules. Loopback-only
    # binds are skipped (not externally reachable). Container must be running.
    - name: "Detect published host ports + protocols of running containers"
      ansible.builtin.shell: |
        set -o pipefail
        ENG="{{ container_engine | default('podman') }}"
        command -v "$ENG" >/dev/null 2>&1 || exit 0   # no engine on this host -> no dynamic rules
        # grep -v returns rc 1 when it filters out everything (all-loopback) or
        # gets no input (no running containers); under pipefail that would wrongly
        # fail the task. Allow rc 1 (no match) but still propagate real errors (rc>=2).
        for c in $($ENG ps -q); do "$ENG" port "$c" 2>/dev/null; done \
          | { grep -vE '(127\.0\.0\.1|\[::1\]):[0-9]+$' || [ "$?" -eq 1 ]; } \
          | sed -E 's@^[0-9]+/(tcp|udp) -> .*:([0-9]+)$@\2 \1@' \
          | sort -u
      args:
        executable: /bin/bash
      become: "{{ _rootful }}"
      register: _detected
      changed_when: false
      when: firewall_detect_ports | default(true) | bool

    - name: "Require an upstream source when detected ports exist"
      ansible.builtin.assert:
        that:
          - firewall_upstream_source | default('') | length > 0
        fail_msg: "Set firewall_upstream_source (e.g. the Caddy host IP) to allow the detected service ports."
      when:
        - firewall_detect_ports | default(true) | bool
        - (_detected.stdout_lines | default([])) | length > 0

    - name: "Allow each DETECTED published port from the upstream (e.g. Caddy)"  # noqa: command-instead-of-module
      ansible.builtin.command: "ufw allow from {{ firewall_upstream_source }} to any port {{ item.split()[0] }} proto {{ item.split()[1] }}"
      register: _detrule
      changed_when: "'Rule added' in _detrule.stdout or 'Rules updated' in _detrule.stdout"
      loop: "{{ _detected.stdout_lines | default([]) }}"
      loop_control:
        label: "{{ item }} from {{ firewall_upstream_source }}"
      when:
        - firewall_detect_ports | default(true) | bool
        - (_detected.stdout_lines | default([])) | length > 0

    - name: "Allow each DETECTED published port on the FORWARD chain (rootful podman / Docker)"  # noqa: command-instead-of-module
      # The INPUT allow above doesn't match DNAT'd container traffic on rootful/
      # Docker hosts — it crosses FORWARD. Mirror each detected port as a route
      # rule so the reverse proxy can actually reach the container. Rootless hosts
      # (_rootful false) skip this: their published ports terminate on the host.
      ansible.builtin.command: "ufw route allow proto {{ item.split()[1] }} from {{ firewall_upstream_source }} to any port {{ item.split()[0] }}"
      register: _detroute
      changed_when: "'Rule added' in _detroute.stdout or 'Rules updated' in _detroute.stdout"
      loop: "{{ _detected.stdout_lines | default([]) }}"
      loop_control:
        label: "{{ item }} from {{ firewall_upstream_source }} (route)"
      when:
        - _rootful
        - firewall_detect_ports | default(true) | bool
        - (_detected.stdout_lines | default([])) | length > 0

    # ── Rootful podman bridge DNS (INPUT): allow container name resolution, which
    # crosses the host INPUT chain only on rootful podman (full rationale in the
    # header note above). Detected at run time so it tracks whatever bridge(s) exist;
    # pin the bridge name in the service compose to keep it stable across recreates.
    - name: "Detect podman bridge interfaces (rootful podman container DNS)"
      ansible.builtin.shell: |
        set -o pipefail
        command -v podman >/dev/null 2>&1 || exit 0   # no podman -> no bridges
        # Parse the bridge iface from `network inspect` JSON with sed — a Go
        # `--format` template (the double-curly kind) collides with Ansible Jinja.
        # Only bridge networks carry network_interface; host/none/macvlan yield none.
        for n in $(podman network ls -q 2>/dev/null); do
          podman network inspect "$n" 2>/dev/null \
            | sed -nE 's/.*network_interface[^A-Za-z0-9]+([A-Za-z0-9_.-]+).*/\1/p'
        done | sort -u
      args:
        executable: /bin/bash
      become: "{{ _rootful }}"
      register: _bridges
      changed_when: false
      when:
        - _allow_bridge_dns
        - _rootful
        - _engine == 'podman'

    - name: "Allow container->gateway DNS (53/udp+tcp) on each podman bridge (INPUT) — BEFORE enable"  # noqa: command-instead-of-module
      # Scoped to port 53 only: aardvark-dns is the sole host-gateway service the
      # containers need, so opening the whole bridge to host INPUT would widen the
      # trust boundary well past the DNS fix. Container<->container traffic is
      # FORWARD (handled by netavark), not INPUT, so it is unaffected by this.
      ansible.builtin.command: "ufw allow in on {{ item.0 }} to any port 53 proto {{ item.1 }}"
      register: _bridgerule
      changed_when: "'Rule added' in _bridgerule.stdout or 'Rules updated' in _bridgerule.stdout"
      loop: "{{ _bridges.stdout_lines | default([]) | product(['udp', 'tcp']) | list }}"
      loop_control:
        label: "{{ item.0 }} 53/{{ item.1 }} (podman bridge DNS, INPUT)"
      when:
        - _allow_bridge_dns
        - _rootful
        - _engine == 'podman'
        - (_bridges.stdout_lines | default([])) | length > 0

    - name: "Default-deny incoming"  # noqa: command-instead-of-module
      ansible.builtin.command: "ufw default deny incoming"
      register: _din
      changed_when: "'changed' in _din.stdout"

    - name: "Default-allow outgoing"  # noqa: command-instead-of-module
      ansible.builtin.command: "ufw default allow outgoing"
      register: _dout
      changed_when: "'changed' in _dout.stdout"

    - name: "Enable UFW"  # noqa: command-instead-of-module
      ansible.builtin.command: "ufw --force enable"
      register: _en
      changed_when: "'active' in _en.stdout"

    # ── Anti-lockout verify: force a NEW SSH connection through the live firewall.
    # The task that ran `ufw enable` used an already-established (allowed)
    # connection; resetting forces a fresh handshake that must pass the new rules.
    # meta: reset_connection cannot be conditional (Ansible ignores `when`), so it
    # always runs — harmless (just forces a reconnect on the next task). The
    # explicit verify below is what firewall_verify_ssh gates.
    - name: "Drop the SSH connection to force a fresh handshake"
      ansible.builtin.meta: reset_connection

    - name: "Verify SSH still works after enabling the firewall"
      ansible.builtin.command: "true"
      changed_when: false
      when: _verify

    - name: "Capture UFW status"  # noqa: command-instead-of-module
      ansible.builtin.command: "ufw status verbose"
      register: _status
      changed_when: false

    - name: "Report"
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} firewall: {{ _status.stdout_lines }}"

---
# seed-n8n-secrets.yml — migration Task 0 (pre-seed) for an EXISTING n8n.
#
# Reads the LIVE values from the n8n host's config/n8n.env and writes the
# STATEFUL secrets into OpenBao at secret/services/n8n, using the exact keys the
# composable deploy expects (encryption_key, db_admin_password, db_user_password).
# This makes the first composable deploy-n8n.yml run FETCH (not generate) them,
# so N8N_ENCRYPTION_KEY is preserved and stored workflow credentials stay
# decryptable.
#
# NON-DESTRUCTIVE: reads the host file + writes OpenBao; does NOT touch the
# running n8n. Run BEFORE the composable cutover, then verify with check-secrets,
# then diff the rendered .env. Skip entirely for a greenfield host (no data).
# Plan: plan/development/nocodb-n8n-composable-migration.md (Task 0).

- name: "Pre-seed n8n stateful secrets into OpenBao (Task 0)"
  hosts: n8n_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ (ansible_user | default('deploy')) ~ '/agent-cloud') }}"
    _deploy_dir: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}"
    _live_env: "{{ live_n8n_env | default(_deploy_dir + '/config/n8n.env') }}"
    _bao_url: "{{ openbao_addr }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"

  tasks:
    - name: "Read the live n8n env file"
      ansible.builtin.slurp:
        src: "{{ _live_env }}"
      register: _envb
      no_log: true

    - name: "Extract the stateful values from the live env"
      ansible.builtin.set_fact:
        _enc_key: "{{ _txt | regex_search('N8N_ENCRYPTION_KEY=(.*)', '\\1') | first }}"
        _admin_pw: "{{ _txt | regex_search('POSTGRES_PASSWORD=(.*)', '\\1') | first }}"
        _user_pw: "{{ _txt | regex_search('POSTGRES_NON_ROOT_PASSWORD=(.*)', '\\1') | first }}"
      vars:
        _txt: "{{ _envb.content | b64decode }}"
      no_log: true

    - name: "Fail if the encryption key was not found (wrong file / empty)"
      ansible.builtin.assert:
        that:
          - _enc_key | default('') | length > 0
          - _admin_pw | default('') | length > 0
          - _user_pw | default('') | length > 0
        fail_msg: "Could not parse N8N_ENCRYPTION_KEY / passwords from {{ _live_env }} — refusing to pre-seed."

    - name: "Authenticate to OpenBao"  # noqa: run-once[task]
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/auth/approle/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ _bao_role_id }}"
          secret_id: "{{ _bao_secret_id }}"
        status_code: [200]
      register: _auth
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: "Fetch any existing n8n secrets (preserve unrelated keys)"  # noqa: run-once[task]
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/n8n"
        method: GET
        headers:
          X-Vault-Token: "{{ _auth.json.auth.client_token }}"
        status_code: [200, 404]
      register: _existing
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: "Merge the live stateful values into OpenBao (idempotent)"  # noqa: run-once[task]
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/n8n"
        method: POST
        headers:
          X-Vault-Token: "{{ _auth.json.auth.client_token }}"
        body_format: json
        body:
          data: >-
            {{ (_existing.json.data.data | default({})) | combine({
                 'encryption_key': _enc_key,
                 'db_admin_password': _admin_pw,
                 'db_user_password': _user_pw }) }}
        status_code: [200]
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: "Report (values redacted)"
      ansible.builtin.debug:
        msg: >-
          Pre-seeded secret/services/n8n: encryption_key (len {{ _enc_key | length }}),
          db_admin_password, db_user_password. Now run check-secrets, then diff the
          rendered .env before the composable cutover.

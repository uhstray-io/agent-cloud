---
# store-ssh-password.yml — Store the operator's bootstrap login/sudo password in
# OpenBao at secret/services/ssh (fields: become_password + login_password).
#
# Why: passwordless-sudo hardening (harden-ssh.yml) needs the current sudo
# password to write the NOPASSWD sudoers drop-in, and Semaphore needs the login
# password to first reach a not-yet-keyed VM. Storing it in OpenBao makes OpenBao
# the source of truth (the site-config ssh_password.txt is a backup) and lets the
# orchestrator source it from there instead of a plaintext file.
#
# ADDITIVE + idempotent: merges the password fields into secret/services/ssh
# WITHOUT touching the management keypair (public_key/private_key) already there.
#
# The password is passed in as an extra var (no_log) and never committed. Runs
# from the Semaphore runner (localhost), which holds the OpenBao AppRole.
#
# Usage (via Semaphore): -e ssh_password=<pw> -e openbao_addr=http://<bao>:8200

- name: "Store bootstrap SSH/sudo password in OpenBao"
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    _bao_url: "{{ openbao_addr | default(lookup('env', 'OPENBAO_ADDR'), true) | default('', true) }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"

  tasks:
    - name: "Validate inputs"
      ansible.builtin.assert:
        that:
          - ssh_password is defined
          - ssh_password | length > 0
          - _bao_url | length > 0
        fail_msg: "Pass -e ssh_password=... and ensure openbao_addr (or OPENBAO_ADDR) + AppRole creds are set."
      no_log: true

    - name: "Authenticate to OpenBao (AppRole)"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/auth/approle/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ _bao_role_id }}"
          secret_id: "{{ _bao_secret_id }}"
      register: _bao_auth
      no_log: true

    - name: "Fetch existing secret/services/ssh (preserve keypair fields)"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/ssh"
        method: GET
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        status_code: [200, 404]
      register: _existing
      no_log: true

    - name: "Merge password fields into secret/services/ssh (keypair preserved)"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/ssh"
        method: POST
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        body_format: json
        body:
          data: >-
            {{ (_existing.json.data.data | default({}))
               | combine({'become_password': ssh_password, 'login_password': ssh_password}) }}
      no_log: true

    - name: "Report"
      ansible.builtin.debug:
        msg: "Stored become_password + login_password at secret/services/ssh (management keypair preserved)."

---
# deploy-service.yml — Deploy a single service from the agent-cloud monorepo.
#
# Usage:
#   ansible-playbook deploy-service.yml -e "target_service=nocodb_svc"
#   Semaphore task template: set target_service as extra variable.
#
# Requires inventory vars per host: service_name, monorepo_repo,
# monorepo_deploy_path, service_url (optional), health_path (optional).
#
# GitHub deploy key fetched from OpenBao at runtime — no keys on disk.
# OpenBao bootstrap note: if deploying OpenBao itself and the vault is not yet
# available, pass github_deploy_key as an extra var.

- name: "Deploy {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: false
  vars:
    target_service: "ungrouped"
    _monorepo_dir: "/home/{{ ansible_user | default('uhstray') }}/agent-cloud"
    _branch: "{{ service_branch | default('main') }}"

    # OpenBao connection (AppRole credentials from Semaphore environment)
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"

  tasks:
    - name: "Validate target_service is set"
      ansible.builtin.assert:
        that:
          - target_service | length > 0
          - monorepo_deploy_path is defined
        fail_msg: "target_service must be set and host must have monorepo_deploy_path defined in inventory"

    - name: "Clone and deploy"
      ansible.builtin.include_tasks: tasks/clone-and-deploy.yml

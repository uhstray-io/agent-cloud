---
# clean-deploy-dns.yml — Destroy and redeploy hickory-dns from scratch.
#
# WARNING: Destroys the DNS container + volumes (zones/config are re-rendered
#          from inventory on redeploy). Local-dev shares one deploy tree, so the
#          clone is NOT removed (clean-service.yml branches on local_mode).
#
# Uses composable tasks/clean-service.yml then runs deploy-dns.yml.

- name: "Clean DNS deployment"
  hosts: dns_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ ansible_user ~ '/agent-cloud') }}"
  tasks:
    - name: "Destroy existing deployment"
      ansible.builtin.include_tasks: tasks/clean-service.yml

- name: "Fresh deploy"
  import_playbook: deploy-dns.yml

---
# clean-deploy-netbox.yml — Destroy and redeploy NetBox from scratch
#
# WARNING: Destroys ALL NetBox data (database, volumes, containers).
# Uses composable tasks/clean-service.yml then runs deploy-netbox.yml.

- name: "Clean NetBox deployment"
  hosts: netbox_svc
  gather_facts: false
  become: false
  vars:
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ (ansible_user | default('deploy')) ~ '/agent-cloud') }}"
  tasks:
    - name: "Destroy existing deployment"
      ansible.builtin.include_tasks: tasks/clean-service.yml

- name: "Fresh deploy"
  import_playbook: deploy-netbox.yml

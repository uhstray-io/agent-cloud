---
# sync-secrets-to-openbao.yml — Push service secrets from VM to OpenBao
#
# Reads all .txt files from a service's secrets/ directory on the target VM
# and stores them in OpenBao at secret/services/<service_name>.
#
# Usage: -e "target_service=netbox_svc"
#
# This playbook exists for recovery/migration — in normal operation, deploy.sh
# stores secrets in OpenBao during deployment. Use this when secrets exist on
# a VM but haven't been pushed to OpenBao (e.g., after a manual deploy).

- name: "Sync secrets to OpenBao for {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: false
  become: false
  vars:
    target_service: "ungrouped"
    _monorepo_dir: "{{ local_monorepo_dir | default('/home/' ~ (ansible_user | default('deploy')) ~ '/agent-cloud') }}"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"

  tasks:
    - name: "Validate requirements"
      ansible.builtin.assert:
        that:
          - service_name is defined
          - monorepo_deploy_path is defined
          - _bao_url | length > 0
        fail_msg: "service_name, monorepo_deploy_path, and openbao_addr must be defined"

    - name: "Find secret files on VM"
      ansible.builtin.find:
        paths: "{{ _monorepo_dir }}/{{ monorepo_deploy_path }}/secrets"
        patterns: "*.txt"
      register: _secret_files

    - name: "Read each secret"
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ _secret_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: _secrets
      no_log: true

    - name: "Build secret JSON"
      ansible.builtin.set_fact:
        _secret_json: >-
          {{ _secret_json | default({}) | combine({
            (item.item.path | basename | regex_replace('\.txt$', '')): (item.content | b64decode | trim)
          }) }}
      loop: "{{ _secrets.results }}"
      loop_control:
        label: "{{ item.item.path | basename }}"
      no_log: true

    - name: "Add service URL"
      ansible.builtin.set_fact:
        _secret_json: "{{ _secret_json | combine({'url': service_url | default('')}) }}"
      when: service_url is defined

    - name: "Authenticate to OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/auth/approle/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ _bao_role_id }}"
          secret_id: "{{ _bao_secret_id }}"
        status_code: [200]
      register: _bao_auth
      no_log: true

    - name: "Store secrets in OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        body_format: json
        body:
          data: "{{ _secret_json }}"
        status_code: [200]
      no_log: true

    - name: "Verify secrets stored"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        status_code: [200]
      register: _verify

    - name: "Report"
      ansible.builtin.debug:
        msg: "{{ service_name }}: {{ _verify.json.data.data | dict2items | map(attribute='key') | list | length }} secrets stored in OpenBao at secret/services/{{ service_name }}"

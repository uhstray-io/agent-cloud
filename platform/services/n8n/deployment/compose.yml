x-n8n-env: &n8n-env
  N8N_HOST: "${N8N_HOSTNAME:-localhost}"
  NODE_ENV: production
  WEBHOOK_URL: "${N8N_WEBHOOK_URL:-http://localhost:5678/}"
  N8N_SECURE_COOKIE: "false"
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: "${POSTGRES_DB:-n8n}"
  DB_POSTGRESDB_USER: "${POSTGRES_NON_ROOT_USER:-n8n_user}"
  DB_POSTGRESDB_PASSWORD: "${POSTGRES_NON_ROOT_PASSWORD}"
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_HEALTH_CHECK_ACTIVE: "true"
  N8N_ENCRYPTION_KEY: "${ENCRYPTION_KEY}"

services:
  postgres:
    image: docker.io/postgres:16
    restart: always
    env_file: ./config/n8n.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER:-n8n_admin} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./config/n8n-init-data.sh:/docker-entrypoint-initdb.d/init-data.sh:ro

  redis:
    image: docker.io/redis:6-alpine
    restart: always
    volumes:
      - redis_storage:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    <<: *n8n-env
    image: docker.n8n.io/n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    env_file: ./config/n8n.env
    environment:
      <<: *n8n-env
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./local-files:/files
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  n8n-worker:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: always
    command: worker
    env_file: ./config/n8n.env
    environment:
      <<: *n8n-env
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./local-files:/files
    depends_on:
      - n8n

volumes:
  db_storage:
    name: n8n_db_storage
  redis_storage:
    name: n8n_redis_storage
  n8n_storage:
    name: n8n_n8n_storage

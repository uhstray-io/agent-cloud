x-n8n-env: &n8n-env
  # Host-facing values are env-parameterized so prod (real domain, HTTPS, secure
  # cookies behind Caddy) needs no fork — local-dev keeps the loopback defaults.
  N8N_HOST: ${N8N_HOST:-localhost}
  NODE_ENV: production
  WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
  N8N_SECURE_COOKIE: "${N8N_SECURE_COOKIE:-false}"
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: n8n-postgres
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n_user
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: n8n-redis
  QUEUE_HEALTH_CHECK_ACTIVE: "true"

services:
  n8n-postgres:
    container_name: workflow-n8n-postgres
    image: docker.io/postgres:16
    restart: always
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_admin -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
      - ./config/n8n-init-data.sh:/docker-entrypoint-initdb.d/init-data.sh:ro

  n8n-redis:
    container_name: workflow-n8n-redis
    image: docker.io/redis:6-alpine
    restart: always
    volumes:
      - n8n_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    container_name: workflow-n8n
    # NB: the :latest DEFAULT is transitional — it matches what the live prod
    # instance currently runs. PIN before relying on it: set N8N_IMAGE (inventory)
    # to a specific tag. For the prod migration the tag MUST equal prod's running
    # version (captured at Task 0 / seed-n8n-secrets.yml) — a silent upgrade can
    # break N8N_ENCRYPTION_KEY-bound workflow credentials.
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:latest}
    restart: always
    ports:
      - "${N8N_LISTEN:-127.0.0.1}:5678:5678"
    env_file: .env
    environment:
      <<: *n8n-env
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      n8n-redis:
        condition: service_healthy
      n8n-postgres:
        condition: service_healthy

  n8n-worker:
    container_name: workflow-n8n-worker
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:latest}
    restart: always
    command: worker
    env_file: .env
    environment:
      <<: *n8n-env
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - n8n

volumes:
  n8n_db_data:
  n8n_redis_data:
  n8n_data:

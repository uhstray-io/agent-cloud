# Slim overlay (local_mode) — appended by platform/lib/common.sh:compose().
# Images/ports are env-parameterized in the BASE (.env). This overlay carries
# memory caps, the SELinux opt (the podman-machine VM enforces SELinux on bind
# mounts + the socket), the extra networks so Prometheus can scrape caddy:2019
# and Caddy can reach grafana:3000 by name, and the engine socket Alloy needs to
# discover container logs.

networks:
  # podman-compose requires every referenced network declared, incl. default.
  default:
  local-dev:
    external: true

services:
  prometheus:
    mem_limit: 384m
    security_opt:
      - label=disable
    networks:
      - o11y
      - default
      - local-dev
  loki:
    mem_limit: 256m
    security_opt:
      - label=disable
  alloy:
    mem_limit: 192m
    security_opt:
      - label=disable
    # Container-log discovery over the VM's rootful podman socket (docker-API
    # compatible). Read-only; label=disable for the VM SELinux.
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock:ro
  grafana:
    mem_limit: 256m
    security_opt:
      - label=disable
    networks:
      - o11y
      - default
      - local-dev

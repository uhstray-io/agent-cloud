services:
  nocodb:
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./config/nocodb.env
    image: docker.io/nocodb/nocodb:latest
    container_name: nocodb
    ports:
      - "8080:8080"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - nc_data:/usr/app/data

  postgres:
    container_name: postgres
    image: docker.io/postgres:16.6
    ports:
      - "5432:5432"
    env_file:
      - ./config/nocodb.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocodb} -d ${POSTGRES_DB:-nocodb}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  nc_data:
    name: nocodb_nc_data
  db_data:
    name: nocodb_db_data

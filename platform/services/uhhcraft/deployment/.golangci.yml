# golangci-lint v2 config for UhhCraft. Run in CI (lint-and-test.yml) and
# locally via `make lint`. Migrated from the v1 schema with `golangci-lint
# migrate`; v2 folds gosimple + typecheck into staticcheck and moves the
# formatters (gofmt/goimports) into their own section.
#
# Generated files are excluded — *_templ.go is produced by `templ generate`
# and internal/db/sqlcdb/* by `sqlc generate`. We lint hand-written code only.
version: "2"
run:
  go: "1.26"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    errcheck:
      # check-blank stays OFF (errcheck default): the codebase deliberately uses
      # `_ = x()` for best-effort, non-fatal operations (Discord/email notifies,
      # cache writes, scans whose error is surfaced via rows.Err()) — a pattern
      # already reviewed and accepted. errcheck still flags bare unchecked calls.
      check-blank: false
    goconst:
      min-len: 4
      min-occurrences: 4
    govet:
      enable:
        - shadow
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # main.go has init() and unused setup helpers we accept.
      - linters:
          - unparam
        path: cmd/server/main\.go
      # http.HandlerFunc / interface signatures require (w, r) even when a param
      # is unused — revive's unused-parameter is pure noise on those. (Genuinely
      # removable unused params are still caught by the `unparam` linter.) Scoped
      # by text so revive's other rules (var-naming, etc.) stay active.
      - linters:
          - revive
        text: unused-parameter
    paths:
      - web/templates       # *.templ + generated *_templ.go
      - internal/db/sqlcdb  # sqlc-generated typed client
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - web/templates
      - internal/db/sqlcdb
      - third_party$
      - builtin$
      - examples$

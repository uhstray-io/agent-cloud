# UhhCraft — USPS API v3 Config
#
# Used for real-time shipping rate quotes at checkout.
# Free shipping is applied server-side for orders >= $50 (before tax).
# Below that threshold, a USPS rate is fetched and presented to the customer.
#
# SECRETS (never put here — use environment variables):
#   USPS_CLIENT_ID      — OAuth 2.0 client ID from USPS developer portal
#   USPS_CLIENT_SECRET  — OAuth 2.0 client secret
#
# SETUP STEPS:
#   1. Register at https://developer.usps.com
#   2. Create an application to get client credentials
#   3. Set USPS_CLIENT_ID and USPS_CLIENT_SECRET in your environment
#   4. Test with the sandbox endpoint before going live
#
# API REFERENCE:
#   https://developers.usps.com/apis
#   Rates endpoint: POST /prices/v3/total-rates/search
#   OAuth token:    POST /oauth2/v3/token (client_credentials grant)
#
# TOKEN CACHING:
#   The Go app caches the OAuth access token and refreshes it before expiry.
#   Token TTL is returned by the USPS token endpoint (typically 3600s).

[usps]
api_base_url = "https://api.usps.com"
sandbox_base_url = "https://apis-tem.usps.com" # USPS sandbox/tem environment
api_version = "v3"
request_timeout_seconds = 15

# Your business origin address ZIP code.
# USPS uses this as the "from" ZIP for rate calculation.
# Update this to your actual location.
origin_zip_code = "07461" # ← SET THIS before launch

# ─────────────────────────────────────────────────────────────────────────────
# Free shipping threshold
# Orders at or above this amount (USD, pre-tax) get free shipping.
# The Go app checks this before calling USPS — no API call needed for free orders.
# ─────────────────────────────────────────────────────────────────────────────

[usps.free_shipping]
threshold_usd = 50.00
display_message = "Free shipping on orders over $50!"

# ─────────────────────────────────────────────────────────────────────────────
# Mail classes to offer at checkout
# USPS mail class identifiers — the Go app requests rates for each enabled class
# and presents them as shipping options with their names and prices.
#
# Common classes:
#   USPS_GROUND_ADVANTAGE    — cheapest, 2-5 days, replaces First-Class Package
#   PRIORITY_MAIL            — 1-3 days, includes $100 insurance
#   PRIORITY_MAIL_EXPRESS    — overnight to 2 days, fastest
#
# Set enabled = false to hide an option from customers.
# ─────────────────────────────────────────────────────────────────────────────

[[usps.mail_classes]]
id = "USPS_GROUND_ADVANTAGE"
display_name = "Standard Shipping"
description = "2–5 business days"
enabled = true
sort_order = 1

[[usps.mail_classes]]
id = "PRIORITY_MAIL"
display_name = "Priority Shipping"
description = "1–3 business days + $100 insurance"
enabled = true
sort_order = 2

[[usps.mail_classes]]
id = "PRIORITY_MAIL_EXPRESS"
display_name = "Express Shipping"
description = "1–2 business days — guaranteed"
enabled = false                                # Enable when ready to offer express
sort_order = 3

# ─────────────────────────────────────────────────────────────────────────────
# Default package dimensions and weights by product type
#
# USPS requires package weight and dimensions for rate calculation.
# These are sensible defaults — update based on your actual packaging.
#
# Weights in ounces (oz). Dimensions in inches.
# ─────────────────────────────────────────────────────────────────────────────

[usps.package_defaults.sticker]
# Stickers ship in a rigid mailer (stays flat, no bending)
weight_oz = 2.0
length_in = 6.0
width_in = 6.0
height_in = 0.5
processing_category = "NON_MACHINABLE"
destination_entry = "NONE"

[usps.package_defaults.print_small]
# Small 3D prints (≤ 5cm bounding box) — padded envelope or small box
weight_oz = 4.0
length_in = 6.0
width_in = 4.0
height_in = 2.0
processing_category = "NON_MACHINABLE"
destination_entry = "NONE"

[usps.package_defaults.print_medium]
# Medium 3D prints (≤ 10cm bounding box) — small box
weight_oz = 12.0
length_in = 8.0
width_in = 6.0
height_in = 4.0
processing_category = "NON_MACHINABLE"
destination_entry = "NONE"

[usps.package_defaults.print_large]
# Large 3D prints (≤ 20cm bounding box) — medium box
weight_oz = 32.0
length_in = 12.0
width_in = 10.0
height_in = 8.0
processing_category = "NON_MACHINABLE"
destination_entry = "NONE"

[usps.package_defaults.print_extra_large]
# Extra large 3D prints (≤ 30cm bounding box) — large box
weight_oz = 64.0
length_in = 16.0
width_in = 14.0
height_in = 12.0
processing_category = "NON_MACHINABLE"
destination_entry = "NONE"

# ─────────────────────────────────────────────────────────────────────────────
# Rate caching
# USPS rates are cached per destination ZIP + product type to reduce API calls.
# Cache TTL: rates are stable within a day; refresh daily or on cache miss.
# ─────────────────────────────────────────────────────────────────────────────

[usps.cache]
enabled = true
ttl_minutes = 60                # Cache individual rate quotes for 1 hour
redis_key_prefix = "usps_rate:"

# ─────────────────────────────────────────────────────────────────────────────
# Fallback behavior
# If the USPS API is unavailable at checkout, fall back to flat rates
# rather than blocking the customer from checking out.
# ─────────────────────────────────────────────────────────────────────────────

[usps.fallback]
enabled = true

[[usps.fallback.rates]]
display_name = "Standard Shipping"
description = "2–5 business days"
price_usd = 5.99

[[usps.fallback.rates]]
display_name = "Priority Shipping"
description = "1–3 business days"
price_usd = 12.99

# UhhCraft — 3D Print Overflow Fulfillment Config
#
# Provider: Hubs (Protolabs Network) — https://www.hubs.com
#
# ⚠ NOTE ON SHAPEWAYS:
#   Shapeways filed for Chapter 11 bankruptcy in 2023 and was subsequently acquired.
#   Their API and service continuity are uncertain. Hubs (now part of Protolabs Network)
#   is the recommended alternative — stable, well-documented REST API, US-based.
#   If Shapeways service resumes under reliable ownership, their config is
#   included below in a disabled [shapeways] section for reference.
#
# SECRETS (never put here — use environment variables):
#   HUBS_API_KEY   — from Hubs dashboard → Account → API Keys
#
# SETUP STEPS:
#   1. Create an account at https://www.hubs.com
#   2. Navigate to Account Settings → API Access → Generate API Key
#   3. Set HUBS_API_KEY in your environment
#   4. Test with the sandbox endpoint before going live (see below)
#   5. Confirm material IDs via GET /api/v2/materials

# ─────────────────────────────────────────────────────────────────────────────
# Hubs (Protolabs Network) — PRIMARY 3D PRINT OVERFLOW PROVIDER
# ─────────────────────────────────────────────────────────────────────────────

[hubs]
enabled             = true
api_base_url        = "https://api.hubs.com"       # Production
sandbox_base_url    = "https://api-sandbox.hubs.com" # Use for testing
api_version         = "v2"
request_timeout_seconds = 60  # 3D file uploads can be slow

# Webhook endpoint — Hubs will POST order status updates here.
# Register this URL in your Hubs dashboard → Integrations → Webhooks.
# Path handled by the Go app at POST /webhooks/hubs
webhook_path = "/webhooks/hubs"

# ─────────────────────────────────────────────────────────────────────────────
# Order defaults
# ─────────────────────────────────────────────────────────────────────────────

[hubs.order_defaults]
# Shipping speed: "standard" or "express"
shipping_speed = "standard"

# Units: "mm" (STL files from Hunyuan3D are in mm)
units = "mm"

# Layer height in mm (must match what was used in production)
layer_height_mm = 0.2

# Infill percentage (15% is sufficient for decorative items)
infill_percent = 15

# Supports: auto-generated by Hubs
supports = "auto"

# ─────────────────────────────────────────────────────────────────────────────
# Material ID mapping
#
# Maps UhhCraft material IDs (from materials.toml) to Hubs material identifiers.
# Verify current IDs via GET /api/v2/materials — they may change.
#
# Hubs uses technology codes (e.g., "FDM", "SLA") + material names.
# ─────────────────────────────────────────────────────────────────────────────

[hubs.material_map]
# Format: uhhcraft_material_id = hubs_material_id
# Values below are examples — verify against current Hubs material catalog.
"pla"       = "FDM_PLA"
"pla-plus"  = "FDM_PLA_PLUS"
"petg"      = "FDM_PETG"
"tpu"       = "FDM_TPU"
"abs"       = "FDM_ABS"
"asa"       = "FDM_ASA"
"resin"     = "SLA_STANDARD_RESIN"

# ─────────────────────────────────────────────────────────────────────────────
# File upload settings
# ─────────────────────────────────────────────────────────────────────────────

[hubs.upload]
# Manufacturing asset format sent to Hubs
file_format       = "stl"
max_file_size_mb  = 50
# MinIO presigned URL TTL for file handoff to Hubs (they download directly)
presigned_url_ttl_minutes = 60

# ─────────────────────────────────────────────────────────────────────────────
# Retry and error handling
# ─────────────────────────────────────────────────────────────────────────────

[hubs.retry]
max_attempts       = 3
initial_backoff_ms = 2000
backoff_multiplier = 2.0

# ─────────────────────────────────────────────────────────────────────────────
# Shapeways — DISABLED (bankruptcy 2023, uncertain status)
# Kept here for reference if service resumes under reliable ownership.
# To re-enable: set enabled = true and verify API endpoints.
# ─────────────────────────────────────────────────────────────────────────────

[shapeways]
enabled          = false
api_base_url     = "https://api.shapeways.com/v1"
request_timeout_seconds = 60
webhook_path     = "/webhooks/shapeways"

# Secret in env: SHAPEWAYS_API_KEY (if re-enabled)

[shapeways.material_map]
# Shapeways material IDs (may be outdated — verify if re-enabling)
"pla"    = "6"    # Versatile Plastic (PA12)
"resin"  = "62"   # Smooth Fine Detail Plastic

# ─────────────────────────────────────────────────────────────────────────────
# Fallback behavior
# If the primary provider (Hubs) fails after all retries:
#   - Set order status to "fulfillment_failed"
#   - Send Discord alert to #ops-alerts with order ID and error details
#   - Operator manually handles the order
# ─────────────────────────────────────────────────────────────────────────────

[fallback]
# Set to true to attempt Shapeways if Hubs fails (only if shapeways.enabled = true)
try_secondary_on_failure = false

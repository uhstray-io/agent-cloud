# UhhCraft — Materials & Options Configuration
#
# This file defines all available material, finish, and cut-type options
# for stickers and 3D prints. Prices are modifiers added to the base item price.
#
# HOW TO ADD A NEW MATERIAL:
#   1. Copy an existing block below.
#   2. Give it a unique `id` (lowercase, hyphens only — used in URLs and DB).
#   3. Fill in display_name, description_customer (shown to buyer — no jargon),
#      description_operator (internal notes), and price_modifier_usd.
#   4. Set available = true.
#   5. Redeploy. Done.
#
# PRICING NOTES:
#   price_modifier_usd is added to the catalog item's base price.
#   Use 0.00 for the "standard" option in each category.
#   Negative values are allowed (e.g., a cheaper cut type).

# ─────────────────────────────────────────────────────────────────────────────
# STICKERS
# ─────────────────────────────────────────────────────────────────────────────

[sticker]


# Authentik blueprint — Grafana OIDC (OAuth2) provider + application.
# config-as-code, applied by the worker. The client_secret is injected from the
# worker's env (GRAFANA_OIDC_CLIENT_SECRET, sourced from OpenBao via env.j2) so
# no secret lives in git. Grafana reads the SAME secret via manage-secrets
# _shared_reads. Plan: AUTH-SSO-DEPLOYMENT.md.
version: 1
metadata:
  name: agent-cloud - Grafana OIDC
context:
  # Grafana's OAuth callback (GF_SERVER_ROOT_URL is :8443 behind Caddy).
  grafana_redirect: https://grafana.agent-cloud.test:8443/login/generic_oauth
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-grafana
    identifiers:
      name: grafana
    attrs:
      client_type: confidential
      client_id: grafana
      client_secret: !Env GRAFANA_OIDC_CLIENT_SECRET
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Context grafana_redirect
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    identifiers:
      slug: grafana
    attrs:
      name: Grafana
      provider: !KeyOf provider-grafana
      meta_launch_url: https://grafana.agent-cloud.test:8443/
      open_in_new_tab: true

# Authentik blueprint — NetBox OIDC (OAuth2) provider + application.
# config-as-code; client_secret injected from the worker env (from OpenBao via
# env.j2). NetBox uses python-social-auth's OpenID Connect backend; its callback
# is /oauth/complete/oidc/. Plan: AUTH-SSO-DEPLOYMENT.md.
version: 1
metadata:
  name: agent-cloud - NetBox OIDC
context:
  netbox_redirect: https://netbox.agent-cloud.test:8443/oauth/complete/oidc/
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-netbox
    identifiers:
      name: netbox
    attrs:
      client_type: confidential
      client_id: netbox
      client_secret: !Env NETBOX_OIDC_CLIENT_SECRET
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Context netbox_redirect
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    identifiers:
      slug: netbox
    attrs:
      name: NetBox
      provider: !KeyOf provider-netbox
      meta_launch_url: https://netbox.agent-cloud.test:8443/
      open_in_new_tab: true

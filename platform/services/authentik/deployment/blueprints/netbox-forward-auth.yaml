# Authentik blueprint — NetBox via forward_auth (proxy provider).
#
# Local-dev SSO mechanism for NetBox. Central Caddy authenticates each request
# against Authentik's embedded outpost (/outpost.goauthentik.io/auth/caddy) and
# injects X-authentik-* identity headers; NetBox trusts them via REMOTE_AUTH_*
# (platform/services/netbox/deployment/docker-compose.local-auth.yml).
#
# Why forward_auth (not OIDC) locally: NetBox runs as its own podman-compose
# project (NETBOX-LOCAL-ENGINE), off the local-dev network. With forward_auth
# NetBox makes NO outbound calls to Authentik, so there is no in-container DNS
# resolution of *.agent-cloud.test and no step-ca TLS-trust to solve — Caddy
# (already on local-dev) does the auth. No client secret either: the proxy
# provider self-manages its tokens.
#
# Prod SSO for NetBox is OIDC (see AUTH-SSO-DEPLOYMENT.md), wired on the
# composable deploy path where shared-secret + reachability are solved.
# The embedded-outpost binding (which proxy providers the outpost serves) and
# the per-app access gate live in zz-sso-bindings.yaml — a single last-applied
# blueprint that owns those shared concerns for ALL forward_auth services, so
# adding a service here can't silently unbind the others.
version: 1
metadata:
  name: agent-cloud - NetBox forward_auth
context:
  netbox_external_host: https://netbox.agent-cloud.test:8443/
entries:
  - model: authentik_providers_proxy.proxyprovider
    id: provider-netbox
    identifiers:
      name: netbox
    attrs:
      mode: forward_single
      external_host: !Context netbox_external_host
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    identifiers:
      slug: netbox
    attrs:
      name: NetBox
      provider: !KeyOf provider-netbox
      meta_launch_url: !Context netbox_external_host
      open_in_new_tab: true

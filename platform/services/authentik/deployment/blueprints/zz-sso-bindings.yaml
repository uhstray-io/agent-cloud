# Authentik blueprint — shared forward_auth bindings (applied LAST).
#
# Owns the cross-service concerns for every forward_auth app so no single
# service's blueprint can clobber another's:
#   1. the embedded-outpost provider list (which proxy providers it serves), and
#   2. the per-app access gate (who may pass forward_auth).
#
# The `zz-` prefix makes this the last blueprint Authentik applies, so every
# !Find below resolves against providers/apps the service blueprints already
# created. Add a new forward_auth service by: (a) its own provider+app blueprint,
# (b) one line in the outpost `providers` list here, (c) one PolicyBinding here.
# Plan: plan/development/AUTH-SSO-DEPLOYMENT.md.
version: 1
metadata:
  name: agent-cloud - SSO bindings
context:
  # Browser-facing IdP URL. Without it the embedded outpost builds its login
  # redirect from its internal listen socket (http://0.0.0.0:9000), which the
  # browser can't reach. The embedded outpost reaches core in-process, so this
  # only affects the browser redirect. Parameterized via !Env: prod sets
  # AUTHENTIK_BROWSER_HOST (env.j2 from inventory, e.g. https://auth.uhstray.io/);
  # the default keeps local-dev byte-identical.
  authentik_browser_host: !Env [AUTHENTIK_BROWSER_HOST, "https://auth.agent-cloud.test:8443/"]
entries:
  # Access gate (RBAC tier 1 — can you reach the service at all?):
  #   platform-admins      -> full access (downstream role = superuser/Admin)
  #   platform-developers  -> read-only access (downstream role = Viewer/view-only)
  #   platform-user    -> NO access (denied here)
  # Authentik superusers always pass so the break-glass akadmin is never locked
  # out. Without this binding the implicit-consent flow would let ANY
  # authenticated user through (and NetBox would auto-provision them).
  - model: authentik_policies_expression.expressionpolicy
    id: policy-platform-member
    identifiers:
      name: platform-member
    attrs:
      expression: |
        allowed = {"platform-admins", "platform-developers"}
        return request.user.is_superuser or bool(
            allowed & {g.name for g in request.user.ak_groups.all()}
        )

  # Admins-only gate (RBAC tier 0 — admin surfaces). Use this instead of
  # platform-member for apps whose login grants a FULL-ADMIN downstream role to
  # everyone who passes (so the deny of developers must happen at the gate, not
  # downstream). The OpenBao native OIDC app is the case: its OpenBao role maps
  # every OIDC user to the `platform-admin` policy (path "*"), so a developer
  # passing platform-member would inherit root OpenBao. Gating openbao-oidc here
  # to platform-admins closes that until prod swaps to group-bound OpenBao
  # policies (AUTH-SSO-DEPLOYMENT.md prod follow-up). Superusers (akadmin) still
  # pass so break-glass is never locked out.
  - model: authentik_policies_expression.expressionpolicy
    id: policy-platform-admin
    identifiers:
      name: platform-admin
    attrs:
      expression: |
        return request.user.is_superuser or (
            "platform-admins" in {g.name for g in request.user.ak_groups.all()}
        )

  # Embedded outpost: serve every forward_auth proxy provider. Replacing the
  # list here (not per service) is safe because this is the single owner.
  - model: authentik_outposts.outpost
    identifiers:
      name: authentik Embedded Outpost
    attrs:
      providers:
        - !Find [authentik_providers_proxy.proxyprovider, [name, netbox]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, openbao]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, n8n]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, openhands]]
      # Embedded outpost is in-process + non-Kubernetes, so only the host/log
      # keys matter; the serializer replaces config wholesale, so we set the
      # meaningful keys and let the inert kubernetes_* defaults fall away.
      config:
        authentik_host: !Context authentik_browser_host
        authentik_host_browser: ""
        authentik_host_insecure: false
        log_level: info
        object_naming_template: ak-outpost-%(name)s
        docker_map_ports: true
        refresh_interval: minutes=5

  # Bind the access gate to EVERY application — forward_auth AND OIDC.
  # Authentik evaluates application policy bindings during the authorization
  # flow, BEFORE issuing an OIDC token, so this enforces the platform tier for
  # OIDC apps (grafana/erpnext/semaphore) too — not just the forward_auth gates.
  # Without it the deny tier (platform-user) could complete OIDC login (grafana
  # self-filters via ALLOWED_GROUPS, but erpnext/semaphore have no other gate).
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, netbox]]
      policy: !KeyOf policy-platform-member
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, openbao]]
      policy: !KeyOf policy-platform-member
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, n8n]]
      policy: !KeyOf policy-platform-member
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, openhands]]
      policy: !KeyOf policy-platform-member
      order: 0
    attrs:
      enabled: true
  # OIDC apps — same tier gate, enforced at the authorization flow.
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, grafana]]
      policy: !KeyOf policy-platform-member
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, erpnext]]
      policy: !KeyOf policy-platform-member
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, semaphore]]
      policy: !KeyOf policy-platform-member
      order: 0
    attrs:
      enabled: true
  # OpenBao native OIDC login app (separate from the forward_auth proxy app
  # `openbao` above). ADMINS-ONLY: the OpenBao role maps every OIDC user to the
  # `platform-admin` policy (path "*"), so developers must be denied at the gate,
  # not downstream — bound to policy-platform-admin (not platform-member).
  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, openbao-oidc]]
      policy: !KeyOf policy-platform-admin
      order: 0
    attrs:
      enabled: true
  # Tombstone the prior platform-member binding on openbao-oidc. Blueprints are
  # ADDITIVE — when this app moved from platform-member to admins-only, the old
  # binding stayed in the DB, and with the app's default `any` (OR) policy mode it
  # would re-admit developers. state: absent deletes it; idempotent no-op on a
  # fresh instance (where it was never created).
  - model: authentik_policies.policybinding
    state: absent
    identifiers:
      target: !Find [authentik_core.application, [slug, openbao-oidc]]
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, platform-member]]
      order: 0

# Authentik blueprint — Semaphore OIDC (OAuth2) provider + application.
# config-as-code, applied by the worker. The client_secret is injected from the
# worker's env (SEMAPHORE_OIDC_CLIENT_SECRET, sourced from OpenBao via env.j2) so
# no secret lives in git. Semaphore reads the SAME secret for its oidc_providers
# config. Plan: AUTH-SSO-DEPLOYMENT.md.
#
# Semaphore has native OIDC: the callback is <web_host>/api/auth/oidc/<key>/
# redirect, where <key> is the provider key in Semaphore's oidc_providers
# ("authentik"). This is true SSO (login as your Authentik identity), unlike the
# forward_auth gates (n8n/NetBox/OpenBao). Semaphore's API/token-driven deploys
# are unaffected — OIDC only fronts the browser UI login.
version: 1
metadata:
  name: agent-cloud - Semaphore OIDC
context:
  # Rendered from inventory at deploy (deploy-authentik.yml templates this file) so
  # the file content — and thus Authentik's re-apply trigger — is env-specific.
  # Prod sets semaphore_redirect_uri/semaphore_launch_url; default is local-dev.
  semaphore_redirect: "{{ semaphore_redirect_uri | default('https://semaphore.agent-cloud.test:8443/api/auth/oidc/authentik/redirect') }}"
  semaphore_launch: "{{ semaphore_launch_url | default('https://semaphore.agent-cloud.test:8443/') }}"
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-semaphore
    identifiers:
      name: semaphore
    attrs:
      client_type: confidential
      client_id: semaphore
      client_secret: !Env SEMAPHORE_OIDC_CLIENT_SECRET
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Context semaphore_redirect
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    identifiers:
      slug: semaphore
    attrs:
      name: Semaphore
      provider: !KeyOf provider-semaphore
      meta_launch_url: !Context semaphore_launch
      open_in_new_tab: true

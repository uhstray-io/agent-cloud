# Authentik blueprint — OpenHands via forward_auth (proxy provider).
#
# canvas.uhstray.io is gated by the central Caddy's forward_auth against the
# embedded outpost; OpenHands itself receives the X-authentik-* identity headers.
# No client secret — the proxy provider self-manages its tokens (same mechanism
# as netbox-forward-auth.yaml).
#
# external_host MUST match the public URL the browser uses or the auth redirect
# breaks — prod value via !Env (OPENHANDS_EXTERNAL_HOST from env.j2); the default
# keeps a local-dev instance working unchanged.
#
# The embedded-outpost binding + the per-app access gate live in
# zz-sso-bindings.yaml (the single owner of those shared concerns).
version: 1
metadata:
  name: agent-cloud - OpenHands forward_auth
entries:
  - model: authentik_providers_proxy.proxyprovider
    id: provider-openhands
    identifiers:
      name: openhands
    attrs:
      mode: forward_single
      external_host: !Env [OPENHANDS_EXTERNAL_HOST, "https://canvas.agent-cloud.test:8443/"]
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  - model: authentik_core.application
    identifiers:
      slug: openhands
    attrs:
      name: OpenHands
      provider: !KeyOf provider-openhands
      meta_launch_url: !Env [OPENHANDS_EXTERNAL_HOST, "https://canvas.agent-cloud.test:8443/"]
      open_in_new_tab: true

# Authentik blueprint — platform service account (config-as-code).
#
# Non-interactive identity for automation/API access to Authentik (e.g. Semaphore
# or scripts managing apps/users). A service_account user plus a non-expiring API
# token. The token value comes from OpenBao via the worker env
# (SERVICE_ACCOUNT_TOKEN, templated by deploy-authentik env.j2) — generated once +
# reused, so re-applying is idempotent and the token is recoverable from OpenBao.
version: 1
metadata:
  name: agent-cloud - service account
entries:
  - model: authentik_core.user
    id: svc-automation-user
    identifiers:
      username: svc-automation
    attrs:
      name: Platform Service Account
      type: service_account
      is_active: true
      path: users/service-accounts
      groups:
        - !Find [authentik_core.group, [name, platform-admins]]
  - model: authentik_core.token
    identifiers:
      identifier: svc-automation-api-token
    attrs:
      user: !KeyOf svc-automation-user
      intent: api
      # Value is the OpenBao-managed SERVICE_ACCOUNT_TOKEN in the worker env.
      key: !Env SERVICE_ACCOUNT_TOKEN
      expiring: false
      description: Platform automation API token (managed in OpenBao)

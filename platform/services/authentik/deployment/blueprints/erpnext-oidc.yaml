# Authentik blueprint — ERPNext OIDC (OAuth2) provider + application.
#
# ERPNext (Frappe) logs users in via a "Social Login Key" (an OAuth2/OIDC
# client). Its callback is
#   /api/method/frappe.integrations.oauth2_logins.custom/<social_login_key>
# where the key name here is "authentik". The client_secret is injected from the
# worker env (ERPNEXT_OIDC_CLIENT_SECRET, sourced from OpenBao via env.j2); the
# ERPNext deploy reads the SAME secret via manage-secrets `_shared_reads` to
# configure the Social Login Key (no secret in git). Plan: AUTH-SSO-DEPLOYMENT.md.
#
# This is OIDC (true SSO into ERPNext as your Authentik identity), unlike the
# forward_auth proxy providers (NetBox/OpenBao) which only gate network access.
version: 1
metadata:
  name: agent-cloud - ERPNext OIDC
context:
  # Rendered from inventory at deploy (deploy-authentik.yml templates this file) so
  # the content is env-specific and Authentik re-applies it. Default is local-dev.
  erpnext_redirect: "{{ erpnext_redirect_uri | default('https://erp.agent-cloud.test:8443/api/method/frappe.integrations.oauth2_logins.custom/authentik') }}"
  erpnext_launch: "{{ erpnext_launch_url | default('https://erp.agent-cloud.test:8443/') }}"
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-erpnext
    identifiers:
      name: erpnext
    attrs:
      client_type: confidential
      client_id: erpnext
      client_secret: !Env ERPNEXT_OIDC_CLIENT_SECRET
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Context erpnext_redirect
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    identifiers:
      slug: erpnext
    attrs:
      name: ERPNext
      provider: !KeyOf provider-erpnext
      meta_launch_url: !Context erpnext_launch
      open_in_new_tab: true

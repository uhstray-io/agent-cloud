# Authentik blueprint — OpenBao OIDC (OAuth2) provider + application.
#
# OpenBao keeps its forward_auth PROXY gate (network-level deny for non-members,
# slug `openbao`); THIS adds native OIDC login so platform-admins map to an
# OpenBao admin policy. One provider per Authentik application, so the OIDC login
# is its own app (slug `openbao-oidc`) alongside the proxy app. The client_secret
# comes from the worker env (OPENBAO_OIDC_CLIENT_SECRET); OpenBao reads the SAME
# secret to configure auth/oidc. The OIDC issuer is
# https://auth.<zone>:8443/application/o/openbao-oidc/ — OpenBao's
# oidc_discovery_url. Plan: AUTH-SSO-DEPLOYMENT.md.
version: 1
metadata:
  name: agent-cloud - OpenBao OIDC
context:
  # OpenBao's oidc auth method (mounted at `oidc`) callbacks: the UI flow + the
  # CLI loopback. Both must be registered as redirect URIs here AND in the
  # OpenBao role's allowed_redirect_uris.
  openbao_redirect_ui: https://openbao.agent-cloud.test:8443/ui/vault/auth/oidc/oidc/callback
  openbao_redirect_cli: http://localhost:8250/oidc/callback
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-openbao-oidc
    identifiers:
      name: openbao-oidc
    attrs:
      client_type: confidential
      client_id: openbao
      client_secret: !Env OPENBAO_OIDC_CLIENT_SECRET
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Context openbao_redirect_ui
        - matching_mode: strict
          url: !Context openbao_redirect_cli
      # profile carries the `groups` claim Authentik emits by default — OpenBao's
      # role groups_claim="groups" maps it to the platform-admins external group.
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    identifiers:
      slug: openbao-oidc
    attrs:
      name: OpenBao (OIDC login)
      provider: !KeyOf provider-openbao-oidc
      # The OpenBao UI login route is /ui/vault/auth with the method preselected
      # via ?with=<mount> — there is NO /ui/vault/auth/oidc route (it 404s in the
      # Ember router). ?with=oidc lands on the login page with OIDC chosen.
      meta_launch_url: https://openbao.agent-cloud.test:8443/ui/vault/auth?with=oidc
      open_in_new_tab: true

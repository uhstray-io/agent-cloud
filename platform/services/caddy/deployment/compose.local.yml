# Slim overlay (local_mode) — appended by platform/lib/common.sh:compose().
# Image / ports / Caddyfile are env-parameterized in the BASE file (compose
# merges those lists append-only, so they can't be overridden here); this
# overlay carries only what overlays CAN add: caps, SELinux opt, and the extra
# network that lets Caddy reverse-proxy the control-plane containers by name.

networks:
  # podman-compose requires every network a service references to be declared
  # at top level — including the otherwise-implicit default.
  default:
  # Created by bootstrap-local-dev.yml; the control-plane containers
  # (local-openbao, local-semaphore) live here.
  local-dev:
    external: true

services:
  caddy:
    mem_limit: 256m
    cpus: 0.75
    # The podman-machine VM enforces SELinux; reading the bind-mounted
    # Caddyfile/sites from a container needs this. Local-only.
    security_opt:
      - label=disable
    # Appended to the base volumes (compose merges volume lists). The
    # step-ca-minted wildcard cert+key live here, minted by
    # tasks/mint-internal-cert.yml; the Caddyfile references the container path.
    volumes:
      - ./certs:/etc/caddy/certs:ro
    networks:
      default:
      # Resolve the IdP's PUBLIC hostname to Caddy on the internal network, so
      # OIDC clients that make server-side token/userinfo calls (ERPNext/NetBox/
      # Semaphore — none support Grafana-style split browser/server URLs) reach
      # the IdP at the SAME https://auth.agent-cloud.test:8443 the browser uses.
      # Caddy's step-ca wildcard cert covers auth.agent-cloud.test, so TLS
      # verifies once the client trusts the step-ca root (the other half of the
      # OIDC-reachability enabler). Foundational + reusable across every OIDC
      # service (AUTH-SSO-DEPLOYMENT.md). Local zone is fixed in this overlay.
      local-dev:
        aliases:
          - auth.agent-cloud.test

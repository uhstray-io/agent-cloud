name: caddy-reverse-proxy

services:
  caddy:
    container_name: caddy
    image: iarekylew00t/caddy-cloudflare:latest
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - caddy-config:/config
      - caddy-data:/data
      - ./Caddyfile:/etc/caddy/Caddyfile
      # Per-site fragments. Read-only — only Ansible writes here, via
      # platform/playbooks/tasks/distribute-caddy-site.yml.
      - ./sites:/etc/caddy/sites:ro

volumes:
  caddy-config:
  caddy-data:

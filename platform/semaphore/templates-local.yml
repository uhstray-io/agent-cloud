---
# templates-local.yml — Semaphore templates that exist ONLY on local-dev
# instances (plan/development/LOCAL-DEV-DEPLOYMENT.md).
#
# Merged by setup-templates.yml exclusively when
# `semaphore_include_local_templates: true` — which only
# platform/playbooks/bootstrap-local-dev.yml sets. The shared templates.yml
# stays prod-clean; applying THIS file to production is structurally prevented
# by that flag defaulting to false.

templates:
  # Local DNS (hickory-dns) — authoritative for the dev zone, forwards the rest.
  # Plan: DNS-SERVER-DEPLOYMENT.md (local half: LOCAL-DEV-DEPLOYMENT.md §5.1).
  - name: "Deploy DNS (Local)"
    playbook: platform/playbooks/deploy-dns.yml


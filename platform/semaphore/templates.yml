# Semaphore Task Templates — Declarative configuration
# Applied by setup-templates.yml playbook
#
# Each template maps to a playbook in this monorepo.
# No secrets or sensitive data — safe for public repo.

templates:
  # ── Deployment ─────────────────────────────────────────────────
  - name: Deploy All Services
    playbook: platform/playbooks/deploy-all.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy OpenBao
    playbook: platform/playbooks/deploy-openbao.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy NocoDB
    playbook: platform/playbooks/deploy-nocodb.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy n8n
    playbook: platform/playbooks/deploy-n8n.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy Semaphore
    playbook: platform/playbooks/deploy-semaphore.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy NetBox
    playbook: platform/playbooks/deploy-netbox.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy NemoClaw
    playbook: platform/playbooks/deploy-nemoclaw.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy WisBot
    playbook: platform/playbooks/deploy-wisbot.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Clean Deploy NetBox
    playbook: platform/playbooks/clean-deploy-netbox.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy Orb Agent
    playbook: platform/playbooks/deploy-orb-agent.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  # pfSense sync runs as an orb-agent worker (every 15 min, no separate playbook)

  # ── WebSmith integration: UhhCraft + inference sidecars ────────
  - name: Deploy UhhCraft
    playbook: platform/playbooks/deploy-uhhcraft.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Deploy ComfyUI Sidecar
    playbook: platform/playbooks/deploy-inference-comfyui.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"
      - name: smoke
        title: "Smoke generation"
        description: "Set to 1 to run a smoke image generation in post-deploy (uses GPU; ~5s)"
        type: string
        required: false
        default_value: "0"

  - name: Deploy Hunyuan3D Sidecar
    playbook: platform/playbooks/deploy-inference-hunyuan3d.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"
      - name: smoke
        title: "Smoke generation"
        description: "Set to 1 to run a smoke 3D generation in post-deploy (uses GPU; ~30s)"
        type: string
        required: false
        default_value: "0"

  - name: Clean Deploy UhhCraft
    playbook: platform/playbooks/clean-deploy-uhhcraft.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  - name: Clean Deploy WisBot
    playbook: platform/playbooks/clean-deploy-wisbot.yml
    survey_vars:
      - name: service_branch
        title: "Branch"
        description: "Git branch to deploy (leave as 'main' for production)"
        type: string
        required: false
        default_value: "main"

  # ── Updates ────────────────────────────────────────────────────
  - name: Update NocoDB
    playbook: platform/playbooks/update-nocodb.yml

  - name: Update n8n
    playbook: platform/playbooks/update-n8n.yml

  - name: Update Semaphore
    playbook: platform/playbooks/update-semaphore.yml

  - name: Update NetBox
    playbook: platform/playbooks/update-netbox.yml

  - name: Update UhhCraft
    playbook: platform/playbooks/update-uhhcraft.yml

  - name: Update ComfyUI Sidecar
    playbook: platform/playbooks/update-inference-comfyui.yml

  - name: Update Hunyuan3D Sidecar
    playbook: platform/playbooks/update-inference-hunyuan3d.yml

  # ── Validation ─────────────────────────────────────────────────
  - name: Validate All Services
    playbook: platform/playbooks/validate-all.yml

  - name: Check Discovery Pipeline
    playbook: platform/playbooks/check-discovery.yml

  - name: Cleanup NetBox
    playbook: platform/playbooks/cleanup-netbox.yml

  - name: Validate Proxmox Cluster
    playbook: platform/playbooks/proxmox-validate.yml

  # ── Secrets ────────────────────────────────────────────────────
  - name: Check Secrets
    playbook: platform/playbooks/check-secrets.yml

  - name: Validate Secrets
    playbook: platform/playbooks/validate-secrets.yml

  - name: Seed Discovery Credentials
    playbook: platform/playbooks/seed-discovery-credentials.yml

  - name: Update Proxmox Token
    playbook: platform/playbooks/update-proxmox-token.yml

  - name: Sync Secrets to OpenBao
    playbook: platform/playbooks/sync-secrets-to-openbao.yml

  - name: Apply All OpenBao Policies
    playbook: platform/playbooks/apply-openbao-policies.yml

  - name: Apply Policy - Orb Agent
    playbook: platform/playbooks/apply-policy-orb-agent.yml

  - name: Apply Policy - Semaphore
    playbook: platform/playbooks/apply-policy-semaphore.yml

  - name: Apply Policy - NemoClaw
    playbook: platform/playbooks/apply-policy-nemoclaw.yml

  - name: Apply Policy - UhhCraft
    playbook: platform/playbooks/apply-policy-uhhcraft.yml

  - name: Apply Policy - ComfyUI Sidecar
    playbook: platform/playbooks/apply-policy-inference-comfyui.yml

  - name: Apply Policy - Hunyuan3D Sidecar
    playbook: platform/playbooks/apply-policy-inference-hunyuan3d.yml

  # ── SSH ────────────────────────────────────────────────────────
  - name: Distribute SSH Keys
    playbook: platform/playbooks/distribute-ssh-keys.yml

  - name: Harden SSH
    playbook: platform/playbooks/harden-ssh.yml

  # ── Infrastructure ─────────────────────────────────────────────
  - name: Install Docker
    playbook: platform/playbooks/install-docker.yml

  - name: Install Podman
    playbook: platform/playbooks/install-podman.yml

  - name: Create VM Template
    playbook: platform/playbooks/provision-template.yml

  - name: Provision VM
    playbook: platform/playbooks/provision-vm.yml

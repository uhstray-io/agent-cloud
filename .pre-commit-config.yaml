---
# Pre-commit hooks for agent-cloud
# Install: pip install pre-commit && pre-commit install
# Manual run: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # trufflehog secret scanning (without --only-verified for local scans)
  - repo: local
    hooks:
      - id: trufflehog-scan
        name: trufflehog secret scan
        language: system
        entry: >-
          bash -c
          'trufflehog git file://. --since-commit HEAD --fail --no-update 2>/dev/null
          || trufflehog filesystem --directory . --fail --no-update 2>/dev/null
          || echo "WARNING: trufflehog not installed. Install with: brew install trufflehog"'
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  # RFC1918 private IP address detection
  - repo: local
    hooks:
      - id: no-private-ips
        name: check for private IP addresses
        language: script
        entry: bash
        args:
          - -c
          - |
            STAGED=$(git diff --cached --diff-filter=ACM -U0)
            if [ -z "$STAGED" ]; then exit 0; fi
            MATCHES=$(echo "$STAGED" \
              | grep -nE "^\+" \
              | grep -v "^+++" \
              | grep -iE "(192\.168\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+)" \
              | grep -vE "(target|host:|subnet|scope|example|placeholder|0\.0\.0\.0|127\.0\.0\.1|\{\{)" \
              || true)
            if [ -n "$MATCHES" ]; then
              echo "ERROR: Private IP addresses found in staged changes:"
              echo "$MATCHES"
              echo ""
              echo "Private IPs belong in site-config, not agent-cloud."
              echo "Use Jinja2 template variables instead."
              exit 1
            fi
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  # Credential pattern detection
  - repo: local
    hooks:
      - id: no-hardcoded-credentials
        name: check for hardcoded credentials
        language: script
        entry: bash
        args:
          - -c
          - |
            STAGED=$(git diff --cached --diff-filter=ACM -U0)
            if [ -z "$STAGED" ]; then exit 0; fi
            FOUND=0
            ADDED=$(echo "$STAGED" | grep -E "^\+" | grep -v "^+++")

            # Password patterns (password/passwd with real values, not template vars)
            PW=$(echo "$ADDED" \
              | grep -iE "password\s*[:=]\s*[A-Za-z0-9!@#\$%^&*]{8,}" \
              | grep -vE "(\{\{|example|placeholder|changeme|CHANGEME|your_|<)" \
              || true)
            if [ -n "$PW" ]; then
              echo "ERROR: Possible hardcoded password:"
              echo "$PW"
              FOUND=1
            fi

            # Secret ID patterns
            SI=$(echo "$ADDED" \
              | grep -iE "secret_id\s*[:=]\s*[a-f0-9-]{30,}" \
              | grep -vE "\{\{" \
              || true)
            if [ -n "$SI" ]; then
              echo "ERROR: Possible hardcoded secret_id:"
              echo "$SI"
              FOUND=1
            fi

            # API key / token patterns (long alphanumeric values)
            TK=$(echo "$ADDED" \
              | grep -iE "(api[_-]?key|token|bearer)\s*[:=]\s*[A-Za-z0-9_.-]{20,}" \
              | grep -vE "(\{\{|example|placeholder|changeme|CHANGEME|your_|<|\.yml|\.yaml)" \
              || true)
            if [ -n "$TK" ]; then
              echo "ERROR: Possible hardcoded API key or token:"
              echo "$TK"
              FOUND=1
            fi

            # Private key headers
            PK=$(echo "$ADDED" \
              | grep -iE "BEGIN (RSA|EC|OPENSSH|DSA) PRIVATE KEY" \
              || true)
            if [ -n "$PK" ]; then
              echo "ERROR: Private key material in staged changes:"
              echo "$PK"
              FOUND=1
            fi

            # GitHub PAT
            GH=$(echo "$ADDED" \
              | grep -E "gh[poas]_[A-Za-z0-9]{36,}" \
              || true)
            if [ -n "$GH" ]; then
              echo "ERROR: GitHub token in staged changes:"
              echo "$GH"
              FOUND=1
            fi

            if [ "$FOUND" -eq 1 ]; then
              echo ""
              echo "Credentials belong in OpenBao, not in code."
              echo "Use template variables or _secret_definitions instead."
              exit 1
            fi
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  # Prevent staging .env files (non-example)
  - repo: local
    hooks:
      - id: no-env-files
        name: prevent .env files from being committed
        language: script
        entry: bash
        args:
          - -c
          - |
            ENV_FILES=$(git diff --cached --name-only --diff-filter=ACM \
              | grep -E "\.env$" \
              | grep -vE "\.(example|template|j2)$" \
              || true)
            if [ -n "$ENV_FILES" ]; then
              echo "ERROR: .env files must not be committed:"
              echo "$ENV_FILES"
              echo ""
              echo ".env files are generated at deploy time from Jinja2 templates."
              echo "Commit .env.example or .env.j2 templates instead."
              exit 1
            fi
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  # Standard pre-commit hooks for general hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: (netbox-docker/|platform/services/.*/deployment/templates/)
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

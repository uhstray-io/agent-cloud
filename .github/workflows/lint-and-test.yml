---
name: Lint and Test

on:
  pull_request:
    branches: [main, dev]

# Least-privilege default for all jobs — CI only reads the repo (no writes,
# no token escalation). Bump per-job if a future job needs more.
permissions:
  contents: read

jobs:
  # Detect which areas changed so language-specific jobs only fire when
  # relevant. The existing lint / security / test jobs continue to run on
  # every PR — only the new Go jobs and the Python-inference scope expansion
  # gate on these outputs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      python_inference: ${{ steps.filter.outputs.python_inference }}
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - 'platform/services/uhhcraft/deployment/**'
              - '.github/workflows/lint-and-test.yml'
            python_inference:
              - 'platform/services/inference-comfyui/deployment/**'
              - 'platform/services/inference-hunyuan3d/deployment/**'
              - '.github/workflows/lint-and-test.yml'
            dockerfiles:
              - 'platform/services/uhhcraft/deployment/Dockerfile'
              - 'platform/services/inference-comfyui/deployment/Dockerfile'
              - 'platform/services/inference-hunyuan3d/deployment/Dockerfile'

  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Python lint (ruff)
        uses: astral-sh/ruff-action@v3

      - name: Shell lint (shellcheck)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./
          severity: warning
          ignore_paths: netbox-docker

      - name: Ansible lint
        run: pip install ansible-lint && ansible-lint platform/playbooks/

      - name: YAML lint
        run: pip install yamllint && yamllint -c .yamllint.yml .

      - name: Dockerfile lint (netbox)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: platform/services/netbox/deployment/Dockerfile-Plugins
          failure-threshold: warning

      - name: Dockerfile lint (uhhcraft)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: platform/services/uhhcraft/deployment/Dockerfile
          failure-threshold: warning

      - name: Dockerfile lint (inference-comfyui)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: platform/services/inference-comfyui/deployment/Dockerfile
          failure-threshold: warning

      - name: Dockerfile lint (inference-hunyuan3d)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: platform/services/inference-hunyuan3d/deployment/Dockerfile
          failure-threshold: warning

      - name: HCL format check
        uses: hashicorp/setup-terraform@v4
      - run: find platform/services/openbao -name '*.hcl' -exec terraform fmt -check {} +

      - name: No ASCII art in plan docs
        run: |
          echo "Checking plan/ markdown files for Unicode box-drawing characters..."
          FOUND=$(grep -rnP '[\x{2500}-\x{257F}]' $(find plan -path 'plan/archive' -prune -o -name '*.md' -print) 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: ASCII art box-drawing characters found in plan/ docs."
            echo "All diagrams must use mermaid fenced blocks."
            echo "$FOUND"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan - verified (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Secret scan - all detectors (trufflehog)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog git file://. --since-commit "$BASE_SHA" --fail --no-update

      - name: RFC1918 IP address audit
        run: |
          echo "Scanning for private IP addresses in diff..."
          HITS=$(git diff origin/main...HEAD \
            | grep -iE '^\+.*(192\.168\.[0-9]{1,3}\.[0-9]{1,3}|10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]{1,3}\.[0-9]{1,3})' \
            | grep -v 'target\|host:\|subnet\|scope\|example\|0\.0\.0\.0\|127\.0\.0\.1' \
            | grep -v '\.0/\|regex\|pattern\|\\d\|\\.\|grep\|`\|Known issue\|\.x\.' \
            || true)
          if [ -n "$HITS" ]; then
            echo "ERROR: Private IP addresses found in diff:"
            echo "$HITS"
            exit 1
          fi

      - name: Credential pattern audit
        run: |
          echo "Scanning for hardcoded credentials in diff..."
          ! git diff origin/main...HEAD | grep -iE '^\+.*password\s*[:=]\s*[A-Za-z0-9]{8}|^\+.*secret_id[:=]\s*[a-f0-9-]{30}'
          ! git diff origin/main...HEAD | grep -iE '^\+.*(api[_-]?key|token)\s*[:=]\s*[A-Za-z0-9_.-]{20,}' | grep -v '{{'
          ! git diff origin/main...HEAD | grep -iE '^\+.*BEGIN (RSA|EC|OPENSSH|DSA) PRIVATE KEY'

      - name: Jinja2 template hardcoded value audit
        run: |
          echo "Checking Jinja2 templates for hardcoded IPs..."
          FOUND=$(find platform/services/*/deployment/templates -name '*.j2' -exec \
            grep -lE '(192\.168\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+)' {} + 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "WARNING: Hardcoded IPs found in Jinja2 templates (should use variables):"
            echo "$FOUND"
            for f in $FOUND; do
              grep -nE '(192\.168\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+)' "$f" || true
            done
            echo "These should be replaced with template variables from site-config inventory."
            exit 1
          fi

      - name: No .env files tracked
        run: |
          echo "Checking for tracked .env files..."
          ENV_FILES=$(git ls-files | grep -E '\.env$' | grep -v '\.env\.example$' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "ERROR: .env files must not be tracked in git:"
            echo "$ENV_FILES"
            exit 1
          fi

      - name: Python security lint (bandit)
        run: |
          pip install bandit
          bandit -r \
            platform/services/netbox/deployment/workers/ \
            platform/services/netbox/deployment/lib/pfsense-sync.py \
            platform/services/inference-comfyui/deployment/app/ \
            platform/services/inference-hunyuan3d/deployment/app/ \
            -s B101,B110 -q

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest netboxlabs-diode-sdk proxmoxer requests

      - name: Run Python tests
        working-directory: platform/services/netbox/deployment
        env:
          PYTHONPATH: workers/proxmox_discovery:workers/pfsense_sync
        run: pytest tests/ -v

      - name: Install BATS
        run: |
          sudo apt-get install -y -qq bats > /dev/null 2>&1

      - name: Run Bash tests
        run: bats platform/tests/

  # ── Go: UhhCraft (Go + templ + sqlc) ─────────────────────────────────
  # Path-gated: only fires when platform/services/uhhcraft/deployment/** changes.
  go-lint:
    name: Go lint (uhhcraft)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/services/uhhcraft/deployment
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: platform/services/uhhcraft/deployment/go.sum

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Generate templ
        run: templ generate

      - name: Generate sqlc
        run: sqlc generate

      - name: Verify generated code is deterministic
        # The generated dirs are gitignored, so `git status` can't see drift in
        # them. Instead snapshot what the steps above produced, regenerate into
        # the tree, and diff against the snapshot — this catches a generator
        # whose output is non-deterministic across runs (tool/version drift).
        run: |
          snapshot="$(mktemp -d)"
          cp -a web/templates "$snapshot/templates"
          cp -a internal/db/sqlcdb "$snapshot/sqlcdb"
          templ generate
          sqlc generate
          fail=0
          diff -ru "$snapshot/templates" web/templates || fail=1
          diff -ru "$snapshot/sqlcdb" internal/db/sqlcdb || fail=1
          if [ "$fail" -ne 0 ]; then
            echo "::error::Generated code is non-deterministic — templ/sqlc produced different output on a second run."
            exit 1
          fi

      - name: golangci-lint
        # action v9 is required for golangci-lint v2 (v6 only runs v1).
        uses: golangci/golangci-lint-action@v9
        with:
          # v2 config (.golangci.yml version: "2"). v2 has no default timeout,
          # so the old `--timeout` arg is dropped.
          version: v2.12.2
          working-directory: platform/services/uhhcraft/deployment

      - name: gosec
        uses: securego/gosec@master
        with:
          # G104 (unchecked errors — covered by errcheck), G304 (file path from
          # var). G704/G710 are experimental taint-analysis rules that don't
          # honor inline //nosec and false-positive here: the only G704 sink is
          # the healthcheck to a fixed 127.0.0.1 (app's own APP_PORT, no request
          # input), and the only G710 redirect target is sanitized by
          # safeNext() to same-origin relative paths.
          args: -exclude=G104,G304,G704,G710 -exclude-dir=web/templates -exclude-dir=internal/db/sqlcdb ./...

  go-test:
    name: Go test (uhhcraft)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/services/uhhcraft/deployment
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: uhhcraft_test
          POSTGRES_USER: uhhcraft
          POSTGRES_PASSWORD: ci-only-not-for-prod
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://uhhcraft:ci-only-not-for-prod@localhost:5432/uhhcraft_test?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: platform/services/uhhcraft/deployment/go.sum

      - name: Install templ + sqlc
        run: |
          go install github.com/a-h/templ/cmd/templ@v0.3.1020
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1

      - name: Generate code
        run: |
          templ generate
          sqlc generate

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 -timeout=2m ./...

  go-build:
    name: Go build (uhhcraft image)
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.dockerfiles == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build UhhCraft image
        # Docker is used in CI (not Podman) — buildx is the path-of-least-resistance
        # for cache and multi-stage builds in GitHub-hosted runners. The runtime
        # in prod is Podman; the resulting image is OCI-compliant and works on either.
        uses: docker/build-push-action@v7
        with:
          context: platform/services/uhhcraft/deployment
          file: platform/services/uhhcraft/deployment/Dockerfile
          push: false
          load: true
          tags: uhhcraft:ci
          build-args: |
            GIT_SHA=${{ github.sha }}

      - name: Smoke test the binary
        run: |
          docker run --rm --entrypoint /app/uhhcraft uhhcraft:ci version
          docker images uhhcraft:ci --format '{{.Repository}}:{{.Tag}}  {{.Size}}'
